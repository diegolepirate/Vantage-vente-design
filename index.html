<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantage CRM - Sales Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#30363d;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--orange:#db6d28;--purple:#bc8cff;--white:#e6edf3;--gray:#8b949e;--dim:rgba(240,246,252,.04)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:48px;text-align:center;max-width:400px;width:90%}
.login-logo{font-size:1.5rem;font-weight:800;margin-bottom:8px}.login-logo span{color:var(--accent)}
.login-sub{font-size:.78rem;color:var(--gray);margin-bottom:32px}
.login-btn{display:block;width:100%;padding:14px;margin-bottom:10px;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;text-align:center}
.login-btn:hover{border-color:var(--accent);background:rgba(88,166,255,.08)}
.login-btn.admin{border-color:var(--purple);color:var(--purple)}.login-btn.admin:hover{background:rgba(188,140,255,.08)}

/* LAYOUT */
#app{display:none}
.topbar{background:var(--s1);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--s3);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{font-size:1rem;font-weight:700}.topbar-logo span{color:var(--accent)}
.topbar-role{font-size:.6rem;padding:3px 8px;border-radius:10px;font-weight:600}
.topbar-role.admin{background:rgba(188,140,255,.12);color:var(--purple)}
.topbar-role.vendor{background:rgba(88,166,255,.12);color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-user{font-size:.78rem;color:var(--gray)}
.btn{padding:8px 16px;border-radius:8px;font-size:.68rem;font-weight:600;cursor:pointer;transition:.2s;border:none}
.btn-accent{background:var(--accent);color:var(--bg)}.btn-accent:hover{opacity:.9}
.btn-ghost{background:transparent;border:1px solid var(--s3);color:var(--gray)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:var(--bg)}.btn-green:hover{opacity:.9}
.btn-sm{padding:5px 10px;font-size:.62rem}

/* TABS */
.tabs{display:flex;gap:0;background:var(--s1);padding:0 24px;border-bottom:1px solid var(--s3);overflow-x:auto}
.tab{padding:12px 20px;font-size:.75rem;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.tab:hover{color:var(--white)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* STATS */
.stats-row{display:flex;gap:12px;padding:20px 24px;flex-wrap:wrap}
.stat-card{background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:16px 20px;min-width:120px;flex:1}
.stat-val{font-size:1.6rem;font-weight:800;line-height:1}
.stat-lbl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-top:4px}
.stat-val.blue{color:var(--accent)}.stat-val.green{color:var(--green)}.stat-val.yellow{color:var(--yellow)}.stat-val.red{color:var(--red)}.stat-val.purple{color:var(--purple)}.stat-val.orange{color:var(--orange)}

/* CONTROLS */
.controls{padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--s1);border-bottom:1px solid var(--s3)}
.search{padding:8px 14px;background:var(--bg);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.78rem;width:220px;outline:none}
.search:focus{border-color:var(--accent)}
.flt{padding:7px 12px;background:var(--bg);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.72rem;outline:none;cursor:pointer}
.cnt{font-size:.72rem;color:var(--gray);margin-left:auto}.cnt b{color:var(--accent)}

/* TABLE */
.table-wrap{padding:0 24px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;margin-top:8px}
th{background:var(--s1);padding:10px;text-align:left;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);border-bottom:1px solid var(--s3);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:88px;z-index:5}
th:hover{color:var(--accent)}
th.sa::after{content:" ▲";color:var(--accent)}
th.sd::after{content:" ▼";color:var(--accent)}
td{padding:8px 10px;font-size:.76rem;border-bottom:1px solid var(--dim)}
tr{transition:.15s}tr:hover{background:rgba(88,166,255,.03)}
tr.row-nouveau{}
tr.row-appelle{background:rgba(210,153,34,.06)!important}tr.row-appelle td:first-child{border-left:3px solid var(--yellow)}
tr.row-valide{background:rgba(63,185,80,.06)!important}tr.row-valide td:first-child{border-left:3px solid var(--green)}
tr.row-perdu{opacity:.4}tr.row-perdu td:first-child{border-left:3px solid var(--red)}
tr.row-negociation{background:rgba(219,109,40,.06)!important}tr.row-negociation td:first-child{border-left:3px solid var(--orange)}
tr.row-rappeler{background:rgba(188,140,255,.06)!important}tr.row-rappeler td:first-child{border-left:3px solid var(--purple)}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.58rem;font-weight:600;white-space:nowrap}
.b-Restauration{background:rgba(248,81,73,.1);color:var(--red)}
.b-Beaute{background:rgba(188,140,255,.1);color:var(--purple)}
.b-CafeBar{background:rgba(88,166,255,.1);color:var(--accent)}
.b-Auto{background:rgba(139,148,158,.1);color:var(--gray)}
.b-Sante{background:rgba(63,185,80,.1);color:var(--green)}
.b-Boulangerie{background:rgba(210,153,34,.1);color:var(--yellow)}
.b-Commerce,.b-Artisans{background:rgba(219,109,40,.1);color:var(--orange)}
.b-Services{background:rgba(188,140,255,.1);color:var(--purple)}
.b-Autre{background:var(--dim);color:var(--gray)}
.type-fixe{font-size:.6rem;color:var(--gray)}.type-port{font-size:.6rem;color:var(--accent);font-weight:600}
.region-tag{font-size:.6rem;color:var(--yellow)}
.phone-link{color:var(--accent);font-weight:500;font-size:.75rem}.phone-link:hover{text-decoration:underline}
.tsel{padding:3px 6px;background:var(--bg);border:1px solid var(--s3);border-radius:5px;color:var(--white);font-size:.68rem;outline:none;cursor:pointer}
.ninp{width:100%;min-width:100px;padding:3px 6px;background:var(--bg);border:1px solid rgba(255,255,255,.04);border-radius:4px;color:var(--white);font-size:.7rem;outline:none}.ninp:focus{border-color:var(--yellow)}

/* PIPELINE */
.pipeline{display:flex;gap:12px;padding:20px 24px;overflow-x:auto;min-height:70vh}
.pipe-col{background:var(--s1);border:1px solid var(--s3);border-radius:10px;min-width:240px;flex:1;display:flex;flex-direction:column;max-height:75vh}
.pipe-col-head{padding:12px 14px;border-bottom:1px solid var(--s3);display:flex;align-items:center;justify-content:space-between}
.pipe-col-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.pipe-col-count{font-size:.6rem;background:var(--s2);padding:2px 8px;border-radius:10px;color:var(--gray)}
.pipe-col-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px}
.pipe-card{background:var(--s2);border:1px solid var(--s3);border-radius:8px;padding:12px;cursor:grab;transition:.2s}
.pipe-card:hover{border-color:var(--accent)}
.pipe-card-name{font-size:.78rem;font-weight:600;margin-bottom:4px}
.pipe-card-phone{font-size:.7rem;color:var(--accent);margin-bottom:4px}
.pipe-card-region{font-size:.58rem;color:var(--yellow)}
.pipe-card-notes{font-size:.62rem;color:var(--gray);margin-top:4px;font-style:italic}

/* VENDOR STATS */
.vendor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;padding:20px 24px}
.vendor-card{background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:20px}
.vendor-card h3{font-size:.9rem;font-weight:700;margin-bottom:12px}
.vendor-stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--dim)}
.vendor-stat-row:last-child{border:none}
.vendor-stat-lbl{font-size:.72rem;color:var(--gray)}.vendor-stat-val{font-size:.72rem;font-weight:700}

/* PROJECTS */
.projects-wrap{padding:20px 24px}
.proj-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.proj-header h2{font-size:1.1rem;font-weight:700}.proj-header h2 span{color:var(--accent)}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.proj-card{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:24px;transition:.2s;position:relative;overflow:hidden}
.proj-card:hover{border-color:var(--accent)}
.proj-card-status{position:absolute;top:16px;right:16px;font-size:.55rem;padding:3px 10px;border-radius:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.proj-card-status.active{background:rgba(63,185,80,.12);color:var(--green)}
.proj-card-status.paused{background:rgba(210,153,34,.12);color:var(--yellow)}
.proj-card-status.completed{background:rgba(88,166,255,.12);color:var(--accent)}
.proj-card-region{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--yellow);margin-bottom:6px}
.proj-card-name{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.proj-card-vendor{font-size:.72rem;color:var(--gray);margin-bottom:16px}
.proj-progress{margin-bottom:16px}
.proj-bar-bg{width:100%;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:6px}
.proj-bar{height:100%;border-radius:3px;transition:width .4s}
.proj-bar.green{background:var(--green)}.proj-bar.yellow{background:var(--yellow)}.proj-bar.red{background:var(--red)}
.proj-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.proj-stat{text-align:center;padding:8px 4px;background:var(--s2);border-radius:6px}
.proj-stat-val{font-size:1rem;font-weight:800;line-height:1}
.proj-stat-lbl{font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin-top:2px}
.proj-actions{display:flex;gap:8px;margin-top:16px}

/* CREATE PROJECT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:32px;max-width:440px;width:90%}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:20px}.modal h3 span{color:var(--accent)}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:6px}
.modal-field input,.modal-field select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.82rem;outline:none}
.modal-field input:focus,.modal-field select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

.hidden{display:none!important}
@media(max-width:768px){
  .stats-row{flex-direction:column}.stat-card{min-width:auto}
  .controls{padding:10px 14px}.table-wrap{padding:0 14px 14px}
  .search{width:100%}.pipeline{flex-direction:column}
  .pipe-col{min-width:auto;max-height:40vh}
  .proj-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><span>VANTAGE</span> CRM</div>
    <div class="login-sub">Sales Pipeline - Grece</div>
    <button class="login-btn" onclick="login('Vendeur 1')">Vendeur 1</button>
    <button class="login-btn" onclick="login('Vendeur 2')">Vendeur 2</button>
    <button class="login-btn" onclick="login('Vendeur 3')">Vendeur 3</button>
    <button class="login-btn admin" onclick="login('Admin')">Admin</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo"><span>VANTAGE</span> CRM</div>
      <span class="topbar-role" id="roleTag"></span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="userName"></span>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Deconnexion</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="table" onclick="switchTab('table')">Prospects</div>
    <div class="tab" data-tab="pipeline" onclick="switchTab('pipeline')">Pipeline</div>
    <div class="tab" data-tab="projects" onclick="switchTab('projects')">Projets</div>
    <div class="tab hidden" data-tab="vendors" id="tabVendors" onclick="switchTab('vendors')">Vendeurs</div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="controls" id="controlsBar">
    <input type="text" class="search" id="q" placeholder="Rechercher...">
    <select class="flt" id="fFam"><option value="">Familles</option></select>
    <select class="flt" id="fReg"><option value="">Regions</option></select>
    <select class="flt" id="fSta"><option value="">Statuts</option><option>nouveau</option><option>appelle</option><option>negociation</option><option>rappeler</option><option>valide</option><option>perdu</option></select>
    <select class="flt" id="fTel"><option value="">Tel</option><option>Fixe</option><option>Portable</option></select>
    <select class="flt" id="fVen"><option value="">Vendeurs</option><option>Vendeur 1</option><option>Vendeur 2</option><option>Vendeur 3</option></select>
    <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Reset</button>
    <span class="cnt"><b id="visCount">0</b> / <span id="totCount">0</span></span>
  </div>

  <div class="table-wrap" id="tableView"><table><thead><tr>
    <th data-c="nom" onclick="doSort('nom')">Nom</th>
    <th data-c="numero" onclick="doSort('numero')">Numero</th>
    <th data-c="type_tel" onclick="doSort('type_tel')">Type</th>
    <th data-c="famille" onclick="doSort('famille')">Famille</th>
    <th data-c="categorie" onclick="doSort('categorie')">Categorie</th>
    <th data-c="region" onclick="doSort('region')">Region</th>
    <th>Vendeur</th>
    <th data-c="status" onclick="doSort('status')">Statut</th>
    <th>Notes</th>
  </tr></thead><tbody id="tbody"></tbody></table></div>

  <div class="pipeline hidden" id="pipelineView"></div>
  <div class="projects-wrap hidden" id="projectsView"></div>
  <div class="vendor-grid hidden" id="vendorsView"></div>
</div>

<!-- CREATE PROJECT MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3><span>Nouveau</span> Projet</h3>
    <div class="modal-field"><label>Nom du projet</label><input id="projName" placeholder="Ex: Mission Crete"></div>
    <div class="modal-field"><label>Region</label><select id="projRegion"></select></div>
    <div class="modal-field"><label>Vendeur assigne</label><select id="projVendeur"><option>Vendeur 1</option><option>Vendeur 2</option><option>Vendeur 3</option></select></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-accent" onclick="createProject()">Creer le projet</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL='https://cckrdgnnufnxfuspihst.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNja3JkZ25udWZueGZ1c3BpaHN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzcyODksImV4cCI6MjA5MTMxMzI4OX0.Fwrmg_k2epYfLOsFgJZYel8-UC1Npm6IUN0LFoiSQ2U';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let DATA=[],PROJECTS=[];
let currentUser=null,isAdmin=false,sortCol='',sortDir=1,currentTab='table';
const STATUSES=['nouveau','appelle','negociation','rappeler','valide','perdu'];
const VENDORS=['','Vendeur 1','Vendeur 2','Vendeur 3'];

// === AUTH ===
function login(name){
  currentUser=name;isAdmin=name==='Admin';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('userName').textContent=name;
  const rt=document.getElementById('roleTag');
  rt.textContent=isAdmin?'ADMIN':'VENDEUR';
  rt.className='topbar-role '+(isAdmin?'admin':'vendor');
  if(isAdmin)document.getElementById('tabVendors').classList.remove('hidden');
  localStorage.setItem('crm_user',name);
  loadData();
}
function logout(){localStorage.removeItem('crm_user');location.reload()}
const saved=localStorage.getItem('crm_user');if(saved)login(saved);

// === DATA ===
async function loadData(){
  const{data}=await sb.from('prospects').select('*').order('id');
  DATA=data||[];
  const{data:proj}=await sb.from('projects').select('*').order('id');
  PROJECTS=proj||[];
  populateFilters();render();
}

function populateFilters(){
  const fams=[...new Set(DATA.map(d=>d.famille))].filter(Boolean).sort();
  const regs=[...new Set(DATA.map(d=>d.region))].filter(Boolean).sort();
  const fF=document.getElementById('fFam'),fR=document.getElementById('fReg'),pR=document.getElementById('projRegion');
  // Clear existing options except first
  while(fF.children.length>1)fF.removeChild(fF.lastChild);
  while(fR.children.length>1)fR.removeChild(fR.lastChild);
  pR.innerHTML='';
  fams.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;fF.appendChild(o)});
  regs.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;fR.appendChild(o);
    const o2=document.createElement('option');o2.value=r;o2.textContent=r;pR.appendChild(o2)});
}

function getFiltered(){
  const q=document.getElementById('q').value.toLowerCase();
  const ff=document.getElementById('fFam').value,fr=document.getElementById('fReg').value;
  const fs=document.getElementById('fSta').value,ft=document.getElementById('fTel').value,fv=document.getElementById('fVen').value;
  let fd=DATA.filter(d=>{
    if(q&&!((d.nom||'').toLowerCase().includes(q)||(d.categorie||'').toLowerCase().includes(q)||(d.region||'').toLowerCase().includes(q)||(d.numero||'').includes(q)))return false;
    if(ff&&d.famille!==ff)return false;if(fr&&d.region!==fr)return false;
    if(fs&&d.status!==fs)return false;if(ft&&d.type_tel!==ft)return false;if(fv&&d.vendeur!==fv)return false;return true;
  });
  if(sortCol)fd.sort((a,b)=>{const av=(a[sortCol]||'').toLowerCase(),bv=(b[sortCol]||'').toLowerCase();return av<bv?-sortDir:av>bv?sortDir:0});
  return fd;
}

// === RENDER ===
function render(){
  renderStats();
  if(currentTab==='table')renderTable();
  else if(currentTab==='pipeline')renderPipeline();
  else if(currentTab==='projects')renderProjects();
  else if(currentTab==='vendors')renderVendors();
}

function renderStats(){
  const d=DATA,t=d.length;
  const n=d.filter(x=>x.status==='nouveau').length,a=d.filter(x=>x.status==='appelle').length;
  const ne=d.filter(x=>x.status==='negociation').length,v=d.filter(x=>x.status==='valide').length;
  const p=d.filter(x=>x.status==='perdu').length;
  const rev=d.reduce((s,x)=>s+(parseFloat(x.revenue)||0),0);
  const conv=v+p>0?((v/(v+p))*100).toFixed(1):'0';
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-val blue">${t.toLocaleString()}</div><div class="stat-lbl">Total</div></div>
    <div class="stat-card"><div class="stat-val">${n.toLocaleString()}</div><div class="stat-lbl">Nouveau</div></div>
    <div class="stat-card"><div class="stat-val yellow">${a.toLocaleString()}</div><div class="stat-lbl">Appelle</div></div>
    <div class="stat-card"><div class="stat-val orange">${ne}</div><div class="stat-lbl">Negociation</div></div>
    <div class="stat-card"><div class="stat-val green">${v}</div><div class="stat-lbl">Gagne</div></div>
    <div class="stat-card"><div class="stat-val red">${p}</div><div class="stat-lbl">Perdu</div></div>
    ${isAdmin?`<div class="stat-card"><div class="stat-val green">${rev.toLocaleString()}&euro;</div><div class="stat-lbl">Revenue</div></div>
    <div class="stat-card"><div class="stat-val purple">${conv}%</div><div class="stat-lbl">Conversion</div></div>`:''}`;
}

function renderTable(){
  const fd=getFiltered(),show=fd.slice(0,500);
  document.getElementById('tbody').innerHTML=show.map(d=>{
    const rc='row-'+(d.status||'nouveau'),tc=d.type_tel==='Portable'?'type-port':'type-fixe';
    const fc='b-'+(d.famille||'Autre').replace(/[& ]/g,'');
    const vo=VENDORS.map(v=>`<option ${d.vendeur===v?'selected':''}>${v}</option>`).join('');
    const so=STATUSES.map(s=>`<option ${d.status===s?'selected':''}>${s}</option>`).join('');
    return `<tr class="${rc}"><td><strong>${d.nom||''}</strong></td><td><a href="tel:${d.numero}" class="phone-link">${d.numero||''}</a></td><td><span class="${tc}">${d.type_tel||''}</span></td><td><span class="badge ${fc}">${d.famille||''}</span></td><td>${d.categorie||''}</td><td><span class="region-tag">${d.region||''}</span></td><td><select class="tsel" onchange="updateField(${d.id},'vendeur',this.value)">${vo}</select></td><td><select class="tsel" onchange="updateField(${d.id},'status',this.value)">${so}</select></td><td><input class="ninp" value="${(d.notes||'').replace(/"/g,'&quot;')}" onblur="updateField(${d.id},'notes',this.value)" placeholder="Notes..."></td></tr>`;
  }).join('');
  document.getElementById('visCount').textContent=fd.length;
  document.getElementById('totCount').textContent=DATA.length;
  if(fd.length>500)document.getElementById('tbody').innerHTML+=`<tr><td colspan="9" style="text-align:center;color:var(--yellow);padding:16px;font-size:.75rem">Limite 500 lignes. Filtrez. Total: ${fd.length}</td></tr>`;
}

function renderPipeline(){
  const pv=document.getElementById('pipelineView');
  const cols=[{key:'nouveau',label:'Nouveau',color:'var(--gray)'},{key:'appelle',label:'Appelle',color:'var(--yellow)'},{key:'negociation',label:'Negociation',color:'var(--orange)'},{key:'rappeler',label:'A Rappeler',color:'var(--purple)'},{key:'valide',label:'Gagne',color:'var(--green)'},{key:'perdu',label:'Perdu',color:'var(--red)'}];
  const my=!isAdmin?DATA.filter(d=>d.vendeur===currentUser):DATA.filter(d=>d.vendeur);
  pv.innerHTML=cols.map(col=>{
    const items=my.filter(d=>d.status===col.key).slice(0,50);
    return `<div class="pipe-col"><div class="pipe-col-head"><span class="pipe-col-title" style="color:${col.color}">${col.label}</span><span class="pipe-col-count">${my.filter(d=>d.status===col.key).length}</span></div><div class="pipe-col-body" ondragover="event.preventDefault()" ondrop="dropCard(event,'${col.key}')">${items.map(d=>`<div class="pipe-card" draggable="true" ondragstart="dragCard(event,${d.id})"><div class="pipe-card-name">${d.nom||''}</div><div class="pipe-card-phone"><a href="tel:${d.numero}" style="color:var(--accent)">${d.numero||''}</a></div><div class="pipe-card-region">${d.region||''} &middot; ${d.famille||''}</div>${d.notes?`<div class="pipe-card-notes">${d.notes}</div>`:''}</div>`).join('')}</div></div>`;
  }).join('');
}

// === PROJECTS ===
function renderProjects(){
  const pv=document.getElementById('projectsView');
  const myProjects=isAdmin?PROJECTS:PROJECTS.filter(p=>p.vendeur===currentUser);

  let html=`<div class="proj-header"><h2><span>Projets</span> ${isAdmin?'- Tous':'- Mes missions'}</h2>`;
  if(isAdmin)html+=`<button class="btn btn-accent" onclick="openModal()">+ Nouveau Projet</button>`;
  html+=`</div><div class="proj-grid">`;

  if(myProjects.length===0){
    html+=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--gray)"><p style="font-size:1.2rem;margin-bottom:8px">Aucun projet</p><p style="font-size:.78rem">${isAdmin?'Creez un projet pour assigner une region a un vendeur.':'Demandez a l\'admin de vous assigner un projet.'}</p></div>`;
  }

  myProjects.forEach(p=>{
    const regionProspects=DATA.filter(d=>d.region===p.region);
    const assigned=regionProspects.filter(d=>d.vendeur===p.vendeur);
    const called=assigned.filter(d=>['appelle','negociation','rappeler','valide','perdu'].includes(d.status));
    const won=assigned.filter(d=>d.status==='valide');
    const lost=assigned.filter(d=>d.status==='perdu');
    const remaining=assigned.filter(d=>d.status==='nouveau');
    const total=regionProspects.length;
    const progress=total>0?((called.length/total)*100).toFixed(0):0;
    const conv=won.length+lost.length>0?((won.length/(won.length+lost.length))*100).toFixed(1):'0';
    const rev=assigned.reduce((s,d)=>s+(parseFloat(d.revenue)||0),0);

    const statusClass=p.status||'active';
    const statusLabel={active:'Actif',paused:'En pause',completed:'Termine'}[statusClass]||'Actif';

    html+=`<div class="proj-card">
      <span class="proj-card-status ${statusClass}">${statusLabel}</span>
      <div class="proj-card-region">${p.region}</div>
      <div class="proj-card-name">${p.name}</div>
      <div class="proj-card-vendor">Assigne a: <strong>${p.vendeur}</strong></div>
      <div class="proj-progress">
        <div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--gray)">
          <span>Progression</span><span style="color:var(--accent);font-weight:700">${progress}%</span>
        </div>
        <div class="proj-bar-bg"><div class="proj-bar ${progress>60?'green':progress>30?'yellow':'red'}" style="width:${progress}%"></div></div>
      </div>
      <div class="proj-stats">
        <div class="proj-stat"><div class="proj-stat-val" style="color:var(--accent)">${total}</div><div class="proj-stat-lbl">Total</div></div>
        <div class="proj-stat"><div class="proj-stat-val" style="color:var(--yellow)">${called.length}</div><div class="proj-stat-lbl">Appeles</div></div>
        <div class="proj-stat"><div class="proj-stat-val" style="color:var(--green)">${won.length}</div><div class="proj-stat-lbl">Gagnes</div></div>
        <div class="proj-stat"><div class="proj-stat-val" style="color:var(--red)">${lost.length}</div><div class="proj-stat-lbl">Perdus</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:.65rem">
        <span style="color:var(--gray)">Restants: <strong style="color:var(--white)">${remaining.length}</strong></span>
        <span style="color:var(--gray)">Conv: <strong style="color:var(--purple)">${conv}%</strong></span>
        <span style="color:var(--gray)">Rev: <strong style="color:var(--green)">${rev.toLocaleString()}&euro;</strong></span>
      </div>
      <div class="proj-actions">
        ${isAdmin?`
          <button class="btn btn-ghost btn-sm" onclick="updateProject(${p.id},'active')">Actif</button>
          <button class="btn btn-ghost btn-sm" onclick="updateProject(${p.id},'paused')">Pause</button>
          <button class="btn btn-ghost btn-sm" onclick="updateProject(${p.id},'completed')">Termine</button>
          <button class="btn btn-ghost btn-sm" onclick="assignRegion(${p.id},'${p.region}','${p.vendeur}')" style="color:var(--green);border-color:var(--green)">Assigner prospects</button>
        `:`
          <button class="btn btn-accent btn-sm" onclick="document.getElementById('fReg').value='${p.region}';document.getElementById('fVen').value='${p.vendeur}';switchTab('table');render()">Voir prospects</button>
        `}
      </div>
    </div>`;
  });

  html+=`</div>`;

  // Admin: show all regions overview
  if(isAdmin){
    const regions=[...new Set(DATA.map(d=>d.region))].filter(Boolean).sort();
    html+=`<div style="margin-top:32px"><h3 style="font-size:.85rem;font-weight:700;margin-bottom:16px;color:var(--gray)">REGIONS DISPONIBLES</h3>`;
    html+=`<div style="display:flex;flex-wrap:wrap;gap:8px">`;
    regions.forEach(r=>{
      const count=DATA.filter(d=>d.region===r).length;
      const hasProject=PROJECTS.some(p=>p.region===r);
      html+=`<div style="background:var(--s2);border:1px solid ${hasProject?'var(--green)':'var(--s3)'};border-radius:8px;padding:10px 16px;font-size:.72rem">
        <strong>${r}</strong> <span style="color:var(--gray)">(${count})</span>
        ${hasProject?'<span style="color:var(--green);margin-left:6px">&#10003;</span>':''}
      </div>`;
    });
    html+=`</div></div>`;
  }

  pv.innerHTML=html;
}

function renderVendors(){
  if(!isAdmin)return;
  const vv=document.getElementById('vendorsView');
  vv.innerHTML=['Vendeur 1','Vendeur 2','Vendeur 3'].map(v=>{
    const vd=DATA.filter(d=>d.vendeur===v);
    const a=vd.length,ap=vd.filter(d=>d.status==='appelle').length;

      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Assignes</span><span class="vendor-stat-val" style="color:var(--accent)">${a}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Appeles</span><span class="vendor-stat-val" style="color:var(--yellow)">${ap}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Negociation</span><span class="vendor-stat-val" style="color:var(--orange)">${ne}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Gagnes</span><span class="vendor-stat-val" style="color:var(--green)">${va}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Perdus</span><span class="vendor-stat-val" style="color:var(--red)">${pe}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Revenue</span><span class="vendor-stat-val" style="color:var(--green)">${rev.toLocaleString()}&euro;</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Conversion</span><span class="vendor-stat-val" style="color:var(--purple)">${conv}%</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Projets actifs</span><span class="vendor-stat-val" style="color:var(--accent)">${projects.filter(p=>p.status==='active').length}</span></div>
    </div>`;
  }).join('');
}

// === TABS ===
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('tableView').classList.toggle('hidden',tab!=='table');
  document.getElementById('pipelineView').classList.toggle('hidden',tab!=='pipeline');
  document.getElementById('projectsView').classList.toggle('hidden',tab!=='projects');
  document.getElementById('vendorsView').classList.toggle('hidden',tab!=='vendors');
  document.getElementById('controlsBar').classList.toggle('hidden',tab!=='table');
  render();
}

// === SORT ===
function doSort(col){
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sa','sd'));
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1}
  const th=document.querySelector(`th[data-c="${col}"]`);if(th)th.classList.add(sortDir===1?'sa':'sd');render();
}

// === UPDATE ===
async function updateField(id,field,value){
  const obj={};obj[field]=value;obj.updated_at=new Date().toISOString();
  if(field==='status'&&value==='appelle')obj.call_date=new Date().toISOString();
  await sb.from('prospects').update(obj).eq('id',id);
  const row=DATA.find(d=>d.id===id);
  if(row){row[field]=value;if(obj.call_date)row.call_date=obj.call_date}
  render();
}

// === DRAG ===
let dragId=null;
function dragCard(e,id){dragId=id;e.dataTransfer.effectAllowed='move'}
async function dropCard(e,status){e.preventDefault();if(dragId){await updateField(dragId,'status',status);dragId=null}}

// === PROJECTS CRUD ===
function openModal(){document.getElementById('modalOverlay').classList.remove('hidden')}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden')}

async function createProject(){
  const name=document.getElementById('projName').value.trim();
  const region=document.getElementById('projRegion').value;
  const vendeur=document.getElementById('projVendeur').value;
  if(!name){alert('Nom requis');return}
  await sb.from('projects').insert([{name,region,vendeur,status:'active'}]);
  closeModal();document.getElementById('projName').value='';
  await loadData();switchTab('projects');
}

async function updateProject(id,status){
  await sb.from('projects').update({status,updated_at:new Date().toISOString()}).eq('id',id);
  const p=PROJECTS.find(x=>x.id===id);if(p)p.status=status;render();
}

async function assignRegion(projId,region,vendeur){
  const unassigned=DATA.filter(d=>d.region===region&&!d.vendeur);
  if(unassigned.length===0){alert('Tous les prospects de '+region+' sont deja assignes!');return}
  if(!confirm(`Assigner ${unassigned.length} prospects de ${region} a ${vendeur} ?`))return;
  const ids=unassigned.map(d=>d.id);
  // Batch update in chunks of 500
  for(let i=0;i<ids.length;i+=500){
    const chunk=ids.slice(i,i+500);
    await sb.from('prospects').update({vendeur,updated_at:new Date().toISOString()}).in('id',chunk);
  }
  unassigned.forEach(d=>d.vendeur=vendeur);
  render();alert(`${unassigned.length} prospects assignes a ${vendeur}!`);
}

// === FILTERS ===
function resetFilters(){['q','fFam','fReg','fSta','fTel','fVen'].forEach(id=>document.getElementById(id).value='');render()}
['q'].forEach(id=>document.getElementById(id).addEventListener('input',render));
['fFam','fReg','fSta','fTel','fVen'].forEach(id=>document.getElementById(id).addEventListener('change',render));

// === EXPORT ===
function exportCSV(){
  const fd=getFiltered();
  let csv='nom,numero,type_tel,famille,categorie,region,adresse,vendeur,statut,notes\n';
  fd.forEach(d=>{csv+=`"${d.nom||''}","${d.numero||''}","${d.type_tel||''}","${d.famille||''}","${d.categorie||''}","${d.region||''}","${d.adresse||''}","${d.vendeur||''}","${d.status||''}","${(d.notes||'').replace(/"/g,'""')}"\n`});
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='vantage_prospects.csv';a.click();
}

// === REALTIME ===
sb.channel('changes').on('postgres_changes',{event:'*',schema:'public',table:'prospects'},p=>{
  if(p.eventType==='UPDATE'){const i=DATA.findIndex(d=>d.id===p.new.id);if(i>=0)DATA[i]=p.new}render();
}).subscribe();
sb.channel('proj-changes').on('postgres_changes',{event:'*',schema:'public',table:'projects'},async()=>{
  const{data}=await sb.from('projects').select('*').order('id');PROJECTS=data||[];render();
}).subscribe();
</script>
