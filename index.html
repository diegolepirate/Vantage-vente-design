<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantage CRM - Sales Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#30363d;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--orange:#db6d28;--purple:#bc8cff;--white:#e6edf3;--gray:#8b949e;--dim:rgba(240,246,252,.04)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:48px;text-align:center;max-width:400px;width:90%}
.login-logo{font-size:1.5rem;font-weight:800;margin-bottom:8px}.login-logo span{color:var(--accent)}
.login-sub{font-size:.78rem;color:var(--gray);margin-bottom:32px}
.login-btn{display:block;width:100%;padding:14px;margin-bottom:10px;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;text-align:center}
.login-btn:hover{border-color:var(--accent);background:rgba(88,166,255,.08)}
.login-btn.admin{border-color:var(--purple);color:var(--purple)}.login-btn.admin:hover{background:rgba(188,140,255,.08)}
.admin-pw-wrap{margin-top:12px;display:none}
.admin-pw-wrap input{width:100%;padding:12px;background:var(--bg);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.85rem;text-align:center;outline:none;margin-bottom:8px}
.admin-pw-wrap input:focus{border-color:var(--purple)}
.admin-pw-wrap .err{color:var(--red);font-size:.72rem;margin-bottom:8px}
.admin-pw-wrap .locked{color:var(--red);font-size:.78rem;font-weight:600}

/* LAYOUT */
#app{display:none}
.topbar{background:var(--s1);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--s3);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{font-size:1rem;font-weight:700}.topbar-logo span{color:var(--accent)}
.topbar-role{font-size:.6rem;padding:3px 8px;border-radius:10px;font-weight:600}
.topbar-role.admin{background:rgba(188,140,255,.12);color:var(--purple)}
.topbar-role.vendor{background:rgba(88,166,255,.12);color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar-user{font-size:.78rem;color:var(--gray)}
.topbar-points{font-size:.78rem;font-weight:700;color:var(--yellow);background:rgba(210,153,34,.1);padding:4px 12px;border-radius:8px}
.btn{padding:8px 16px;border-radius:8px;font-size:.68rem;font-weight:600;cursor:pointer;transition:.2s;border:none}
.btn-accent{background:var(--accent);color:var(--bg)}.btn-accent:hover{opacity:.9}
.btn-ghost{background:transparent;border:1px solid var(--s3);color:var(--gray)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:var(--bg)}.btn-green:hover{opacity:.9}
.btn-red{background:var(--red);color:var(--bg)}.btn-red:hover{opacity:.9}
.btn-sm{padding:5px 10px;font-size:.62rem}

/* TABS */
.tabs{display:flex;gap:0;background:var(--s1);padding:0 24px;border-bottom:1px solid var(--s3);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 20px;font-size:.75rem;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.tab:hover{color:var(--white)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* STATS */
.stats-row{display:flex;gap:12px;padding:20px 24px;flex-wrap:wrap}
.stat-card{background:var(--s1);border:2px solid var(--s3);border-radius:10px;padding:16px 20px;min-width:120px;flex:1;cursor:pointer;transition:.2s;user-select:none}
.stat-card:hover{border-color:var(--accent);background:rgba(88,166,255,.03)}
.stat-card.active{border-color:var(--accent)!important;box-shadow:0 0 12px rgba(88,166,255,.15)}
.stat-val{font-size:1.6rem;font-weight:800;line-height:1}
.stat-lbl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-top:4px}
.stat-val.blue{color:var(--accent)}.stat-val.green{color:var(--green)}.stat-val.yellow{color:var(--yellow)}.stat-val.red{color:var(--red)}.stat-val.purple{color:var(--purple)}.stat-val.orange{color:var(--orange)}

/* CONTROLS */
.controls{padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--s1);border-bottom:1px solid var(--s3)}
.search{padding:8px 14px;background:var(--bg);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.78rem;width:220px;outline:none}
.search:focus{border-color:var(--accent)}
.flt{padding:7px 12px;background:var(--bg);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.72rem;outline:none;cursor:pointer}
.cnt{font-size:.72rem;color:var(--gray);margin-left:auto}.cnt b{color:var(--accent)}

/* TABLE */
.table-wrap{padding:0 24px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;margin-top:8px}
th{background:var(--s1);padding:10px;text-align:left;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);border-bottom:1px solid var(--s3);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:88px;z-index:5}
th:hover{color:var(--accent)}
th.sa::after{content:" \25B2";color:var(--accent)}
th.sd::after{content:" \25BC";color:var(--accent)}
td{padding:8px 10px;font-size:.76rem;border-bottom:1px solid var(--dim)}
tr{transition:.15s}tr:hover{background:rgba(88,166,255,.03)}
tr.row-nouveau{}
tr.row-appelle{background:rgba(210,153,34,.06)!important}tr.row-appelle td:first-child{border-left:3px solid var(--yellow)}
tr.row-valide{background:rgba(63,185,80,.06)!important}tr.row-valide td:first-child{border-left:3px solid var(--green)}
tr.row-perdu{opacity:.4}tr.row-perdu td:first-child{border-left:3px solid var(--red)}
tr.row-negociation{background:rgba(219,109,40,.06)!important}tr.row-negociation td:first-child{border-left:3px solid var(--orange)}
tr.row-rappeler{background:rgba(188,140,255,.06)!important}tr.row-rappeler td:first-child{border-left:3px solid var(--purple)}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.58rem;font-weight:600;white-space:nowrap}
.b-Restauration{background:rgba(248,81,73,.1);color:var(--red)}
.b-Beaute{background:rgba(188,140,255,.1);color:var(--purple)}
.b-CafeBar{background:rgba(88,166,255,.1);color:var(--accent)}
.b-Auto{background:rgba(139,148,158,.1);color:var(--gray)}
.b-Sante{background:rgba(63,185,80,.1);color:var(--green)}
.b-Boulangerie{background:rgba(210,153,34,.1);color:var(--yellow)}
.b-Commerce,.b-Artisans{background:rgba(219,109,40,.1);color:var(--orange)}
.b-Services{background:rgba(188,140,255,.1);color:var(--purple)}
.b-Autre{background:var(--dim);color:var(--gray)}
.type-fixe{font-size:.6rem;color:var(--gray)}.type-port{font-size:.6rem;color:var(--accent);font-weight:600}
.region-tag{font-size:.6rem;color:var(--yellow)}
.phone-link{color:var(--accent);font-weight:500;font-size:.75rem}.phone-link:hover{text-decoration:underline}
.tsel{padding:3px 6px;background:var(--bg);border:1px solid var(--s3);border-radius:5px;color:var(--white);font-size:.68rem;outline:none;cursor:pointer}
.ninp{width:100%;min-width:100px;padding:3px 6px;background:var(--bg);border:1px solid rgba(255,255,255,.04);border-radius:4px;color:var(--white);font-size:.7rem;outline:none}.ninp:focus{border-color:var(--yellow)}

/* PIPELINE */
.pipeline{display:flex;gap:12px;padding:20px 24px;overflow-x:auto;min-height:70vh}
.pipe-col{background:var(--s1);border:1px solid var(--s3);border-radius:10px;min-width:240px;flex:1;display:flex;flex-direction:column;max-height:75vh}
.pipe-col-head{padding:12px 14px;border-bottom:1px solid var(--s3);display:flex;align-items:center;justify-content:space-between}
.pipe-col-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.pipe-col-count{font-size:.6rem;background:var(--s2);padding:2px 8px;border-radius:10px;color:var(--gray)}
.pipe-col-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin}
.pipe-card{background:var(--s2);border:1px solid var(--s3);border-radius:8px;padding:12px;cursor:grab;transition:.2s}
.pipe-card:hover{border-color:var(--accent)}
.pipe-card-name{font-size:.78rem;font-weight:600;margin-bottom:4px;cursor:pointer}
.pipe-card-name:hover{color:var(--accent)}
.pipe-card-phone{font-size:.7rem;color:var(--accent);margin-bottom:4px}
.pipe-card-region{font-size:.58rem;color:var(--yellow)}
.pipe-card-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:.52rem;font-weight:600;margin-left:4px}
.pipe-card-notes{font-size:.62rem;color:var(--gray);margin-top:4px;font-style:italic}
.pipe-card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

/* VENDOR STATS */
.vendor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;padding:20px 24px}
.vendor-card{background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:20px}
.vendor-card h3{font-size:.9rem;font-weight:700;margin-bottom:12px}
.vendor-stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--dim)}
.vendor-stat-row:last-child{border:none}
.vendor-stat-lbl{font-size:.72rem;color:var(--gray)}.vendor-stat-val{font-size:.72rem;font-weight:700}

/* PROJECTS */
.projects-wrap{padding:20px 24px}
.proj-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.proj-header h2{font-size:1.1rem;font-weight:700}.proj-header h2 span{color:var(--accent)}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.proj-card{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:24px;transition:.2s;position:relative;overflow:hidden}
.proj-card:hover{border-color:var(--accent)}
.proj-card-status{position:absolute;top:16px;right:16px;font-size:.55rem;padding:3px 10px;border-radius:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.proj-card-status.active{background:rgba(63,185,80,.12);color:var(--green)}
.proj-card-status.paused{background:rgba(210,153,34,.12);color:var(--yellow)}
.proj-card-status.completed{background:rgba(88,166,255,.12);color:var(--accent)}
.proj-card-region{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--yellow);margin-bottom:6px}
.proj-card-name{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.proj-card-vendor{font-size:.72rem;color:var(--gray);margin-bottom:16px}
.proj-progress{margin-bottom:16px}
.proj-bar-bg{width:100%;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:6px}
.proj-bar{height:100%;border-radius:3px;transition:width .4s}
.proj-bar.green{background:var(--green)}.proj-bar.yellow{background:var(--yellow)}.proj-bar.red{background:var(--red)}
.proj-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.proj-stat{text-align:center;padding:8px 4px;background:var(--s2);border-radius:6px}
.proj-stat-val{font-size:1rem;font-weight:800;line-height:1}
.proj-stat-lbl{font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin-top:2px}
.proj-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

/* CREATE PROJECT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:32px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:20px}.modal h3 span{color:var(--accent)}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:6px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.82rem;outline:none;font-family:inherit}
.modal-field textarea{min-height:80px;resize:vertical}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* DAILY CHALLENGE BANNER */
.challenge-banner{margin:16px 24px 0;padding:16px 20px;background:var(--s1);border:1px solid var(--s3);border-left:4px solid var(--yellow);border-radius:10px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.challenge-icon{font-size:1.6rem}
.challenge-info{flex:1;min-width:200px}
.challenge-title{font-size:.8rem;font-weight:700;color:var(--yellow);margin-bottom:2px}
.challenge-desc{font-size:.72rem;color:var(--gray)}
.challenge-progress{margin-top:6px}
.challenge-bar-bg{width:100%;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:4px}
.challenge-bar{height:100%;background:var(--yellow);border-radius:3px;transition:width .4s}
.challenge-pct{font-size:.6rem;color:var(--yellow);font-weight:700}

/* LEADERBOARD */
.leaderboard-wrap{padding:20px 24px}
.lb-card{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:20px 24px;margin-bottom:12px;display:flex;align-items:center;gap:20px;transition:.2s}
.lb-card:hover{border-color:var(--accent)}
.lb-card.rank-1{border-color:var(--yellow);background:rgba(210,153,34,.04)}
.lb-rank{font-size:1.8rem;font-weight:800;min-width:50px;text-align:center;color:var(--gray)}
.lb-rank.r1{color:var(--yellow)}
.lb-rank.r2{color:var(--gray)}
.lb-rank.r3{color:var(--orange)}
.lb-name{font-size:1rem;font-weight:700;flex:1}
.lb-crown{font-size:1.2rem;margin-left:6px}
.lb-stats{display:flex;gap:24px;flex-wrap:wrap}
.lb-stat{text-align:center}
.lb-stat-val{font-size:1.2rem;font-weight:800}
.lb-stat-lbl{font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin-top:2px}

/* BADGES */
.badges-wrap{padding:20px 24px}
.badges-section{margin-bottom:32px}
.badges-section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--gray);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--s3)}
.badge-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:1024px){.badge-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.badge-grid{grid-template-columns:repeat(2,1fr)}}
.badge-card{background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:20px 16px;text-align:center;transition:.3s;position:relative}
.badge-card.unlocked{border-color:rgba(88,166,255,.3);box-shadow:0 0 15px rgba(88,166,255,.15)}
.badge-card.locked{opacity:.4}
.badge-card.locked .badge-emoji{filter:grayscale(1)}
.badge-card.locked::after{content:'\1F512';position:absolute;top:8px;right:8px;font-size:.6rem}
.badge-emoji{font-size:3rem;line-height:1;margin-bottom:10px;display:block}
.badge-name{font-size:.72rem;font-weight:700;margin-bottom:4px}
.badge-desc{font-size:.58rem;color:var(--gray);line-height:1.4}
.badge-date{font-size:.52rem;color:var(--accent);margin-top:6px}

/* TOAST */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--s1);border:1px solid var(--accent);border-radius:10px;padding:16px 20px;min-width:280px;max-width:380px;animation:slideInToast .4s ease;pointer-events:auto;position:relative;overflow:hidden}
.toast.badge-toast{border-color:var(--yellow)}
.toast-title{font-size:.82rem;font-weight:700;margin-bottom:4px}
.toast-body{font-size:.72rem;color:var(--gray)}
.toast-close{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--gray);cursor:pointer;font-size:.9rem}
@keyframes slideInToast{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutToast{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}

/* CONFETTI */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99999;overflow:hidden}
.confetti-dot{position:absolute;width:8px;height:8px;border-radius:50%;animation:confettiFall 2.5s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(0);opacity:0}}

/* CALL TIMER FLOATING BAR */
.call-timer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:2px solid var(--accent);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:200;gap:12px;flex-wrap:wrap;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.call-timer-name{font-size:.82rem;font-weight:700}
.call-timer-display{font-size:1.4rem;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
.call-timer-pulse{width:10px;height:10px;border-radius:50%;background:var(--red);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* DETAIL PANEL (right side) */
#detailPanel{position:fixed;top:0;right:0;width:420px;max-width:100vw;height:100vh;background:var(--s1);border-left:1px solid var(--s3);z-index:300;overflow-y:auto;padding:24px;transform:translateX(100%);transition:transform .3s ease}
#detailPanel.open{transform:translateX(0)}
#detailPanelBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:299;display:none}
#detailPanelBackdrop.open{display:block}
.detail-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--gray);cursor:pointer;font-size:1.4rem;z-index:2}
.detail-close:hover{color:var(--white)}

/* SIDE PANEL (legacy for call history) */
.side-panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;justify-content:flex-end}
.side-panel{width:480px;max-width:95vw;background:var(--s1);border-left:1px solid var(--s3);height:100%;overflow-y:auto;padding:24px;animation:slideInPanel .3s ease}
@keyframes slideInPanel{from{transform:translateX(100%)}to{transform:translateX(0)}}
.side-panel h3{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.side-panel h3 button{background:none;border:none;color:var(--gray);cursor:pointer;font-size:1.2rem}

/* CALL HISTORY ENTRY */
.call-entry{background:var(--s2);border:1px solid var(--s3);border-radius:8px;padding:12px;margin-bottom:8px}
.call-entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.call-entry-date{font-size:.68rem;color:var(--gray)}
.call-entry-result{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px}
.call-entry-result.interested{background:rgba(63,185,80,.15);color:var(--green)}
.call-entry-result.not-interested{background:rgba(248,81,73,.15);color:var(--red)}
.call-entry-result.callback{background:rgba(188,140,255,.15);color:var(--purple)}
.call-entry-result.no-answer{background:rgba(139,148,158,.15);color:var(--gray)}
.call-entry-info{font-size:.72rem;color:var(--gray)}
.call-entry-notes{font-size:.68rem;color:var(--white);margin-top:6px;font-style:italic}

/* SCRIPTS / POST-IT */
.scripts-wrap{padding:20px 24px}
.scripts-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.scripts-masonry{columns:3;column-gap:16px}
@media(max-width:900px){.scripts-masonry{columns:2}}
@media(max-width:600px){.scripts-masonry{columns:1}}
.postit{break-inside:avoid;border-radius:10px;padding:16px;position:relative;min-height:120px;cursor:default;transition:.2s;margin-bottom:16px}
.postit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.postit-title{font-size:.82rem;font-weight:700;margin-bottom:8px;padding-right:50px}
.postit-content{font-size:.72rem;line-height:1.6;white-space:pre-wrap}
.postit-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px}
.postit-actions button{background:rgba(0,0,0,.15);border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center}
.postit-actions button:hover{background:rgba(0,0,0,.3)}

/* CLIENTS */
.clients-wrap{padding:20px 24px}
.clients-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.client-card{background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:20px;transition:.2s}
.client-card:hover{border-color:var(--accent)}
.client-card.status-delivered{border-color:var(--green);background:rgba(63,185,80,.04)}
.client-card.status-maintenance{border-color:var(--purple);background:rgba(188,140,255,.04)}
.client-card-name{font-size:.9rem;font-weight:700;margin-bottom:4px}
.client-card-phone{font-size:.78rem;color:var(--accent);margin-bottom:8px}
.client-card-meta{font-size:.68rem;color:var(--gray);margin-bottom:8px}
.site-status-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ss-not_started{background:rgba(139,148,158,.15);color:var(--gray)}
.ss-in_progress{background:rgba(210,153,34,.15);color:var(--yellow)}
.ss-preview_sent{background:rgba(88,166,255,.15);color:var(--accent)}
.ss-delivered{background:rgba(63,185,80,.15);color:var(--green)}
.ss-maintenance{background:rgba(188,140,255,.15);color:var(--purple)}

/* ACTIVITY LOG */
.log-table{width:100%;border-collapse:collapse}
.log-table th{background:var(--s2);padding:10px;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);text-align:left;border-bottom:1px solid var(--s3)}
.log-table td{padding:8px 10px;font-size:.72rem;border-bottom:1px solid var(--dim)}

/* REMINDERS */
.reminders-wrap{padding:20px 24px}
.reminder-item{background:var(--s2);border:1px solid var(--s3);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:.2s}
.reminder-item:hover{border-color:var(--accent)}
.reminder-item.overdue{border-left:4px solid var(--red);background:rgba(248,81,73,.06)}
.reminder-item.done{opacity:.4}

/* CALL SCRIPT PANEL */
.script-panel{background:var(--s2);border:1px solid var(--s3);border-radius:8px;padding:16px;margin-top:12px}
.script-panel h4{font-size:.75rem;font-weight:700;margin-bottom:8px;color:var(--accent);cursor:pointer}
.script-lang{margin-bottom:10px}
.script-lang-title{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--yellow);margin-bottom:4px}
.script-lang-text{font-size:.72rem;line-height:1.6;color:var(--white);background:var(--bg);padding:10px;border-radius:6px}
.objection-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.objection-btn{padding:8px 14px;background:var(--s1);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.68rem;font-weight:600;cursor:pointer;transition:.2s}
.objection-btn:hover{border-color:var(--accent);background:rgba(88,166,255,.08)}

/* BLACKLIST ICON */
.bl-icon{cursor:pointer;font-size:.82rem;transition:.2s}.bl-icon:hover{transform:scale(1.2)}

/* ADMIN ALERTS */
.alert-card{background:rgba(248,81,73,.08);border:1px solid var(--red);border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;font-size:.75rem}
.alert-card .dismiss{background:none;border:none;color:var(--gray);cursor:pointer;font-size:.82rem}

/* FINANCIAL DASHBOARD */
.fin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.fin-card{background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:20px;text-align:center}
.fin-card-val{font-size:1.6rem;font-weight:800;line-height:1;margin-bottom:4px}
.fin-card-lbl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray)}

/* DUPLICATE WARNING */
.dup-item{background:rgba(210,153,34,.08);border:1px solid var(--yellow);border-radius:8px;padding:12px;margin-bottom:8px;font-size:.75rem}

/* COLOR PICKER */
.color-circle{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s;display:inline-block}
.color-circle:hover{transform:scale(1.1)}
.color-circle.selected{border-color:var(--white)!important;box-shadow:0 0 8px rgba(255,255,255,.3)}

.hidden{display:none!important}
@media(max-width:768px){

}

// POINTS SYSTEM
// ========================================
function calcPoints(vendor){
  const vd=DATA.filter(d=>d.vendeur===vendor);
  let pts=0;
  pts+=vd.filter(d=>d.status==='appelle').length*1;
  pts+=vd.filter(d=>d.status==='negociation').length*20;
  pts+=vd.filter(d=>d.status==='valide').length*100;
  const bonus=parseInt(localStorage.getItem('bonus_pts_'+vendor)||'0');
  return pts+bonus;
}

function getVendorStats(vendor){
  const vd=DATA.filter(d=>d.vendeur===vendor);
  const calls=vd.filter(d=>['appelle','negociation','rappeler','valide','perdu'].includes(d.status)).length;
  const wins=vd.filter(d=>d.status==='valide').length;
  const nego=vd.filter(d=>d.status==='negociation').length;
  const lost=vd.filter(d=>d.status==='perdu').length;
  const rev=wins*500;
  const regions=[...new Set(vd.map(d=>d.region))].filter(Boolean);
  const notes=vd.filter(d=>d.notes&&d.notes.trim()).length;
  const rappeler=vd.filter(d=>d.status==='rappeler').length;
  const conv=wins+lost>0?((wins/(wins+lost))*100).toFixed(1):'0';
  return{calls,wins,nego,lost,rev,regions,notes,rappeler,total:vd.length,conv};
}

function getTodayCalls(vendor){
  const today=new Date().toISOString().slice(0,10);
  return DATA.filter(d=>d.vendeur===vendor&&d.call_date&&d.call_date.slice(0,10)===today&&['appelle','negociation','rappeler','valide','perdu'].includes(d.status)).length;
}

function getWeekSales(vendor){
  const now=new Date();
  const monday=new Date(now);monday.setDate(now.getDate()-((now.getDay()+6)%7));monday.setHours(0,0,0,0);
  return DATA.filter(d=>d.vendeur===vendor&&d.status==='valide'&&d.updated_at&&new Date(d.updated_at)>=monday).length;
}

let adminAttempts=0;
function showAdminLogin(){
  const wrap=document.getElementById('adminPwWrap');
  const lockUntil=localStorage.getItem('admin_lock_until');
  if(lockUntil&&Date.now()<parseInt(lockUntil)){
    const remaining=Math.ceil((parseInt(lockUntil)-Date.now())/1000);
    wrap.style.display='block';
    document.getElementById('adminPwErr').innerHTML='<span class="locked">Compte verrouille. Reessayez dans '+remaining+'s</span>';
    document.getElementById('adminPwInput').disabled=true;
    return;
  }
  wrap.style.display='block';
  document.getElementById('adminPwErr').textContent='';
  document.getElementById('adminPwInput').disabled=false;
  document.getElementById('adminPwInput').focus();
}

function attemptAdminLogin(){
  const lockUntil=localStorage.getItem('admin_lock_until');
  if(lockUntil&&Date.now()<parseInt(lockUntil)){
    const remaining=Math.ceil((parseInt(lockUntil)-Date.now())/1000);
    document.getElementById('adminPwErr').innerHTML='<span class="locked">Compte verrouille. Reessayez dans '+remaining+'s</span>';
    return;
  }
  const pw=document.getElementById('adminPwInput').value;
  if(pw===ADMIN_PASSWORD){
    adminAttempts=0;
    localStorage.removeItem('admin_lock_until');
    login('Admin');
  } else {
    adminAttempts++;
    if(adminAttempts>=3){
      const lockTime=Date.now()+5*60*1000;
      localStorage.setItem('admin_lock_until',String(lockTime));
      document.getElementById('adminPwErr').innerHTML='<span class="locked">3 tentatives echouees. Verrouille 5 minutes.</span>';
      document.getElementById('adminPwInput').disabled=true;
      adminAttempts=0;
    } else {
      document.getElementById('adminPwErr').textContent='Mot de passe incorrect ('+(3-adminAttempts)+' essais restants)';
    }
  }
}

async function loadData(){
  const[prospRes,projRes,clientRes,remRes,blRes]=await Promise.all([
    sb.from('prospects').select('*').order('id'),
    sb.from('projects').select('*').order('id'),
    sb.from('clients').select('*').order('id'),
    sb.from('reminders').select('*').order('remind_at'),
    sb.from('blacklist').select('*').order('id')
  ]);
  ALL_DATA=prospRes.data||[];
  PROJECTS=projRes.data||[];
  CLIENTS=clientRes.data||[];
  REMINDERS=remRes.data||[];
  BLACKLIST=blRes.data||[];

  // Filter out blacklisted
  const blIds=new Set(BLACKLIST.map(b=>b.prospect_id));
  DATA=ALL_DATA.filter(d=>!d.blacklisted&&!blIds.has(d.id));

  populateFilters();
  render();
  if(isAdmin)checkDuplicates();
  if(isAdmin)checkInactivityAlerts();
}

function populateFilters(){
  const fams=[...new Set(DATA.map(d=>d.famille))].filter(Boolean).sort();
  const regs=[...new Set(DATA.map(d=>d.region))].filter(Boolean).sort();
  const fF=document.getElementById('fFam'),fR=document.getElementById('fReg'),pR=document.getElementById('projRegion');
  while(fF.children.length>1)fF.removeChild(fF.lastChild);
  while(fR.children.length>1)fR.removeChild(fR.lastChild);
  pR.innerHTML='';
  fams.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;fF.appendChild(o)});
  regs.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;fR.appendChild(o);
    const o2=document.createElement('option');o2.value=r;o2.textContent=r;pR.appendChild(o2)});
}

function getFiltered(){
  const q=document.getElementById('q').value.toLowerCase();
  const ff=document.getElementById('fFam').value,fr=document.getElementById('fReg').value;
  const fs=document.getElementById('fSta').value,ft=document.getElementById('fTel').value,fv=document.getElementById('fVen').value;
  let fd=DATA.filter(d=>{
    if(q&&!((d.nom||'').toLowerCase().includes(q)||(d.categorie||'').toLowerCase().includes(q)||(d.region||'').toLowerCase().includes(q)||(d.numero||'').includes(q)))return false;
    if(ff&&d.famille!==ff)return false;if(fr&&d.region!==fr)return false;
    if(fs&&d.status!==fs)return false;if(ft&&d.type_tel!==ft)return false;if(fv&&d.vendeur!==fv)return false;
    // statusFilter from stat cards
    if(statusFilter&&d.status!==statusFilter)return false;
    return true;
  });
  if(sortCol)fd.sort((a,b)=>{const av=(a[sortCol]||'').toString().toLowerCase(),bv=(b[sortCol]||'').toString().toLowerCase();return av<bv?-sortDir:av>bv?sortDir:0});
  return fd;
}

function filterByStatus(status){

  render();
}

function renderStats(){
  const d=DATA,t=d.length;
  const n=d.filter(x=>x.status==='nouveau').length,a=d.filter(x=>x.status==='appelle').length;
  const ne=d.filter(x=>x.status==='negociation').length,ra=d.filter(x=>x.status==='rappeler').length;
  const v=d.filter(x=>x.status==='valide').length,p=d.filter(x=>x.status==='perdu').length;
  const conv=v+p>0?((v/(v+p))*100).toFixed(1):'0';

  const cards=[
    {val:t,label:'Total',color:'blue',status:''},
    {val:n,label:'Nouveau',color:'',status:'nouveau'},
    {val:a,label:'Appelle',color:'yellow',status:'appelle'},
    {val:ne,label:'Negociation',color:'orange',status:'negociation'},
    {val:ra,label:'Rappeler',color:'purple',status:'rappeler'},
    {val:v,label:'Gagne',color:'green',status:'valide'},
    {val:p,label:'Perdu',color:'red',status:'perdu'}
  ];

  let html=cards.map(c=>{
    const isActive=statusFilter===c.status&&c.status!=='';
    return `<div class="stat-card${isActive?' active':''}" onclick="${c.status?`filterByStatus('${c.status}')`:`statusFilter='';document.getElementById('fSta').value='';render()`}">
      <div class="stat-val${c.color?' '+c.color:''}">${c.val.toLocaleString()}</div>
      <div class="stat-lbl">${c.label}</div>
    </div>`;
  }).join('');

  if(isAdmin){
    const revenue=v*500;
    html+=`<div class="stat-card"><div class="stat-val green">${revenue.toLocaleString()}\u20AC</div><div class="stat-lbl">Revenue</div></div>
    <div class="stat-card"><div class="stat-val purple">${conv}%</div><div class="stat-lbl">Conversion</div></div>`;
  }
  document.getElementById('statsRow').innerHTML=html;
}

  loadCallHistory(id).then(calls=>{

    if(!el)return;
    if(!calls.length){el.innerHTML='<div style="color:var(--gray);font-size:.72rem">Aucun appel enregistre.</div>';return;}

      const resultClass=c.result==='Interested'?'interested':c.result==='Not interested'?'not-interested':c.result==='Call back'?'callback':'no-answer';

// ========================================
// CALL TIMER
// ========================================
function startCall(prospectId,prospectName){
  if(callTimerInterval)return showToast('Appel en cours','Terminez l\'appel actuel d\'abord.','var(--red)');
  callTimerProspectId=prospectId;
  callTimerProspectName=prospectName;
  callTimerStart=Date.now();

  const bar=document.getElementById('callTimerBar');
  bar.classList.remove('hidden');
  bar.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px">
      <div class="call-timer-pulse"></div>
      <div class="call-timer-name">En appel: ${prospectName}</div>
    </div>
    <div class="call-timer-display" id="timerDisplay">00:00:00</div>
    <button class="btn btn-red" onclick="endCall()">Terminer l'appel</button>`;

  callTimerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-callTimerStart)/1000);
    const h=String(Math.floor(elapsed/3600)).padStart(2,'0');
    const m=String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
    const s=String(elapsed%60).padStart(2,'0');
    const el=document.getElementById('timerDisplay');
    if(el)el.textContent=h+':'+m+':'+s;
  },1000);
}

function endCall(){
  clearInterval(callTimerInterval);
  const duration=Math.floor((Date.now()-callTimerStart)/1000);
  callTimerInterval=null;
  document.getElementById('callTimerBar').classList.add('hidden');

  const m=document.getElementById('modal2Content');
  m.innerHTML=`<h3><span>Resultat</span> de l'appel</h3>
    <div style="margin-bottom:12px;font-size:.78rem;color:var(--gray)">Prospect: <strong style="color:var(--white)">${callTimerProspectName}</strong> &middot; Duree: <strong style="color:var(--accent)">${formatDuration(duration)}</strong></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <button class="btn btn-green" onclick="saveCallResult('Interested',${duration})">Interested</button>
      <button class="btn btn-red" onclick="saveCallResult('Not interested',${duration})">Not interested</button>
      <button class="btn" style="background:var(--purple);color:var(--bg)" onclick="saveCallResult('Call back',${duration})">Call back</button>
      <button class="btn btn-ghost" onclick="saveCallResult('No answer',${duration})">No answer</button>
    </div>
    <div class="modal-field"><label>Notes (optionnel)</label><textarea id="callNotes" placeholder="Notes sur l'appel..."></textarea></div>`;
  document.getElementById('modal2Overlay').classList.remove('hidden');
}

async function saveCallResult(result,duration){
  const notes=(document.getElementById('callNotes')||{}).value||'';
  // Save to call_history
  await sb.from('call_history').insert([{
    prospect_id:callTimerProspectId,
    vendor_name:currentUser,
    duration_seconds:duration,
    result:result,
    notes:notes,
    created_at:new Date().toISOString()
  }]);

  // Log activity
  await logActivity('call',callTimerProspectName,callTimerProspectId,'Result: '+result+', Duration: '+formatDuration(duration));

  // Update prospect status based on result
  const statusMap={'Interested':'negociation','Not interested':'perdu','Call back':'rappeler','No answer':'appelle'};
  const newStatus=statusMap[result]||'appelle';
  await updateField(callTimerProspectId,'status',newStatus);

  // Update call tracking fields on prospect
  const row=DATA.find(d=>d.id===callTimerProspectId);
  if(row){
    const updates={
      last_called_at:new Date().toISOString(),
      total_calls:(parseInt(row.total_calls)||0)+1,
      call_duration_total:(parseInt(row.call_duration_total)||0)+duration
    };
    await sb.from('prospects').update(updates).eq('id',callTimerProspectId);
    Object.assign(row,updates);
  }

  // If "Call back", show reminder picker
  if(result==='Call back'){
    closeModal2();
    showReminderPicker(callTimerProspectId,callTimerProspectName);
    return;
  }

  closeModal2();
  showToast('Appel enregistre','Resultat: '+result,'var(--green)');
  callTimerProspectId=null;callTimerProspectName=null;
}

function formatDuration(sec){
  if(!sec)return '0s';
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  return (h?h+'h ':'')+(m?m+'m ':'')+s+'s';
}

function renderReminders(){
  const rv=document.getElementById('remindersView');
  const myReminders=isAdmin?REMINDERS:REMINDERS.filter(r=>r.vendor_name===currentUser);
  const now=new Date();

  let html=`<h2 style="font-size:1.2rem;font-weight:800;margin-bottom:20px">Mes Rappels</h2>`;

  const upcoming=myReminders.filter(r=>!r.is_dismissed&&!r.done).sort((a,b)=>new Date(a.remind_at)-new Date(b.remind_at));
  const done=myReminders.filter(r=>r.is_dismissed||r.done);

  if(!upcoming.length&&!done.length){
    html+=`<div style="text-align:center;padding:60px;color:var(--gray)">Aucun rappel. Les rappels sont crees quand vous marquez un prospect "rappeler".</div>`;
    rv.innerHTML=html;return;
  }

  // Overdue first
  const overdue=upcoming.filter(r=>new Date(r.remind_at)<now);
  const future=upcoming.filter(r=>new Date(r.remind_at)>=now);
  const sorted=[...overdue,...future];

  if(sorted.length){
    html+=`<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;color:var(--gray);margin-bottom:12px;letter-spacing:.08em">A venir (${sorted.length})</div>`;
    sorted.forEach(r=>{
      const remDate=new Date(r.remind_at);
      const isOverdue=remDate<now;
      const prospect=DATA.find(d=>d.id===r.prospect_id);
      const pName=prospect?prospect.nom:(r.prospect_name||'Prospect');
      const pPhone=prospect?prospect.numero:'';
      html+=`<div class="reminder-item ${isOverdue?'overdue':''}">
        <div style="flex:1">
          <div style="font-size:.82rem;font-weight:700">${pName}</div>
          ${pPhone?`<div style="font-size:.72rem;margin-top:2px"><a href="tel:${pPhone}" style="color:var(--accent)">${pPhone}</a></div>`:''}
          <div style="font-size:.68rem;color:${isOverdue?'var(--red)':'var(--gray)'};margin-top:2px">${remDate.toLocaleString('fr-FR')} ${isOverdue?'(EN RETARD)':''}</div>
          ${r.message?`<div style="font-size:.68rem;color:var(--gray);font-style:italic;margin-top:2px">${r.message}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${!isAdmin&&prospect?`<button class="btn btn-accent btn-sm" onclick="event.stopPropagation();startCall(${r.prospect_id},'${esc(pName)}')">\uD83D\uDCDE</button>`:''}
          <button class="btn btn-green btn-sm" onclick="markReminderDone(${r.id})">Done</button>
        </div>
      </div>`;
    });
  }

  if(done.length){
    html+=`<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;color:var(--gray);margin-top:24px;margin-bottom:12px;letter-spacing:.08em">Termines (${done.length})</div>`;
    done.slice(0,20).forEach(r=>{
      const pName=r.prospect_name||'Prospect';
      html+=`<div class="reminder-item done">
        <div style="flex:1">
          <div style="font-size:.82rem;font-weight:700">${pName}</div>
          <div style="font-size:.68rem;color:var(--gray);margin-top:2px">${new Date(r.remind_at).toLocaleString('fr-FR')}</div>
        </div>
        <span style="font-size:.72rem;color:var(--green)">Done</span>
      </div>`;
    });
  }

  rv.innerHTML=html;
}

async function markReminderDone(id){

  const r=REMINDERS.find(x=>x.id===id);
  if(r){r.is_dismissed=true;r.done=true;}

function renderProjects(){
  const pv=document.getElementById('projectsView');
  const myProjects=isAdmin?PROJECTS:PROJECTS.filter(p=>p.vendeur===currentUser||p.vendeur==='Tous');

  let html=`<div class="proj-header"><h2><span>Projets</span> ${isAdmin?'- Tous':'- Mes missions'}</h2>`;
  html+=`<button class="btn btn-accent" onclick="openModal()">+ Nouveau Projet</button>`;
  html+=`</div><div class="proj-grid">`;

  if(myProjects.length===0){
    html+=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--gray)"><p style="font-size:1.2rem;margin-bottom:8px">Aucun projet</p><p style="font-size:.78rem">${isAdmin?'Creez un projet pour assigner une region a un vendeur.':'Demandez a l\'admin de vous assigner un projet.'}</p></div>`;
  }

  myProjects.forEach(p=>{
    const regionProspects=DATA.filter(d=>d.region===p.region);
    const assigned=p.vendeur==='Tous'?regionProspects:regionProspects.filter(d=>d.vendeur===p.vendeur);
    const called=assigned.filter(d=>['appelle','negociation','rappeler','valide','perdu'].includes(d.status));
    const won=assigned.filter(d=>d.status==='valide');
    const lost=assigned.filter(d=>d.status==='perdu');
    const remaining=assigned.filter(d=>d.status==='nouveau');
    const total=regionProspects.length;
    const progress=total>0?((called.length/total)*100).toFixed(0):0;
    const conv=won.length+lost.length>0?((won.length/(won.length+lost.length))*100).toFixed(1):'0';

    const statusClass=p.status||'active';
    const statusLabel={active:'Actif',paused:'En pause',completed:'Termine'}[statusClass]||'Actif';

    html+=`<div class="proj-card">
      <span class="proj-card-status ${statusClass}">${statusLabel}</span>
      <div class="proj-card-region">${p.region}</div>
      <div class="proj-card-name">${p.name}</div>
      <div class="proj-card-vendor">Assigne a: <strong>${p.vendeur}</strong></div>
      <div class="proj-progress">
        <div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--gray)">
          <span>Progression</span><span style="color:var(--accent);font-weight:700">${progress}%</span>
        </div>
        <div class="proj-bar-bg"><div class="proj-bar ${progress>60?'green':progress>30?'yellow':'red'}" style="width:${progress}%"></div></div>
      </div>
      <div class="proj-stats">
        <div class="proj-stat"><div class="proj-stat-val" style="color:var(--accent)">${total}</div><div class="proj-stat-lbl">Total</div></div>
        <div class="proj-stat"><div class="proj-stat-val" style="color:var(--yellow)">${called.length}</div><div class="proj-stat-lbl">Appeles</div></div>
        <div class="proj-stat"><div class="proj-stat-val" style="color:var(--green)">${won.length}</div><div class="proj-stat-lbl">Gagnes</div></div>
        <div class="proj-stat"><div class="proj-stat-val" style="color:var(--red)">${lost.length}</div><div class="proj-stat-lbl">Perdus</div></div>
        <div class="proj-stat"><div class="proj-stat-val" style="color:var(--gray)">${remaining.length}</div><div class="proj-stat-lbl">Restants</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:.65rem">
        <span style="color:var(--gray)">Conv: <strong style="color:var(--purple)">${conv}%</strong></span>
      </div>
      <div class="proj-actions">
        ${isAdmin?`
          <button class="btn btn-ghost btn-sm" onclick="updateProject(${p.id},'active')">Actif</button>
          <button class="btn btn-ghost btn-sm" onclick="updateProject(${p.id},'paused')">Pause</button>
          <button class="btn btn-ghost btn-sm" onclick="updateProject(${p.id},'completed')">Termine</button>
          <button class="btn btn-ghost btn-sm" onclick="assignRegion(${p.id},'${esc(p.region)}','${esc(p.vendeur)}')" style="color:var(--green);border-color:var(--green)">Assigner prospects</button>
          <button class="btn btn-ghost btn-sm" onclick="deleteProject(${p.id})" style="color:var(--red);border-color:var(--red)">Supprimer</button>
        `:`
          <button class="btn btn-accent btn-sm" onclick="document.getElementById('fReg').value='${esc(p.region)}';document.getElementById('fVen').value='${currentUser}';switchTab('table');render()">Voir prospects</button>
        `}
      </div>
    </div>`;
  });

  html+=`</div>`;

  if(isAdmin){
    const regions=[...new Set(DATA.map(d=>d.region))].filter(Boolean).sort();
    html+=`<div style="margin-top:32px"><h3 style="font-size:.85rem;font-weight:700;margin-bottom:16px;color:var(--gray)">REGIONS DISPONIBLES</h3>`;

        <strong>${r}</strong> <span style="color:var(--gray)">(${count})</span>
        ${hasProject?'<span style="color:var(--green);margin-left:6px">&#10003;</span>':''}
      </div>`;
    });
    html+=`</div></div>`;
  }

  pv.innerHTML=html;
}

        <div class="lb-stat"><div class="lb-stat-val" style="color:var(--green)">${r.rev.toLocaleString()}\u20AC</div><div class="lb-stat-lbl">Revenue</div></div>
        <div class="lb-stat"><div class="lb-stat-val" style="color:var(--purple)">${r.conv}%</div><div class="lb-stat-lbl">Conv.</div></div>
      </div>
    </div>`;
  });

  // Weekly/Monthly highlights
  html+=`<div style="margin-top:32px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px">`;
  const weekSales=VENDOR_NAMES.map(v=>({name:v,sales:getWeekSales(v)})).sort((a,b)=>b.sales-a.sales);
  html+=`<div style="background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:20px">
    <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:12px">Ventes cette semaine</div>
    ${weekSales.map((w,i)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--dim);font-size:.78rem">
      <span>${i===0?'\uD83E\uDD47':''}${i===1?'\uD83E\uDD48':''}${i===2?'\uD83E\uDD49':''} ${w.name}</span>
      <strong style="color:var(--green)">${w.sales}</strong>
    </div>`).join('')}
  </div>`;

  const callsToday=VENDOR_NAMES.map(v=>({name:v,calls:getTodayCalls(v)})).sort((a,b)=>b.calls-a.calls);
  html+=`<div style="background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:20px">
    <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:12px">Appels aujourd'hui</div>
    ${callsToday.map((w,i)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--dim);font-size:.78rem">
      <span>${i===0?'\uD83E\uDD47':''}${i===1?'\uD83E\uDD48':''}${i===2?'\uD83E\uDD49':''} ${w.name}</span>
      <strong style="color:var(--accent)">${w.calls}</strong>
    </div>`).join('')}
  </div>`;

  const ptsRank=VENDOR_NAMES.map(v=>({name:v,pts:calcPoints(v)})).sort((a,b)=>b.pts-a.pts);
  html+=`<div style="background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:20px">
    <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:12px">Points totaux</div>
    ${ptsRank.map((w,i)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--dim);font-size:.78rem">
      <span>${i===0?'\uD83E\uDD47':''}${i===1?'\uD83E\uDD48':''}${i===2?'\uD83E\uDD49':''} ${w.name}</span>
      <strong style="color:var(--yellow)">${w.pts}</strong>
    </div>`).join('')}
  </div>`;

  html+=`</div>`;
  lv.innerHTML=html;
}

function getBadges(vendor){
  const key='badges_'+vendor;
  let stored=localStorage.getItem(key);
  if(!stored){
    const init={};BADGE_DEFS.forEach(b=>{init[b.id]={unlocked:false,date:null}});
    localStorage.setItem(key,JSON.stringify(init));
    return init;
  }
  const parsed=JSON.parse(stored);
  BADGE_DEFS.forEach(b=>{if(!parsed[b.id])parsed[b.id]={unlocked:false,date:null}});
  return parsed;
}

function saveBadges(vendor,badges){
  localStorage.setItem('badges_'+vendor,JSON.stringify(badges));
}

function renderBadges(targetVendor){
  const vendor=targetVendor||currentUser;
  if(isAdmin&&!targetVendor){renderBadgesAdmin();return;}
  const bv=document.getElementById('badgesView');

function renderVendors(){
  if(!isAdmin)return;
  const vv=document.getElementById('vendorsView');

  // Financial dashboard at top
  let finHtml=`<div style="grid-column:1/-1;margin-bottom:24px">
    <h2 style="font-size:1.1rem;font-weight:800;margin-bottom:16px">Financial Dashboard</h2>
    <div class="fin-grid">`;

  const totalWon=DATA.filter(d=>d.status==='valide').length;
  const maintenanceCount=CLIENTS.filter(c=>c.site_status==='maintenance'||c.with_maintenance).length;
  const totalRevenue=totalWon*500;
  const revenueWithMaintenance=(totalWon-maintenanceCount)*500+maintenanceCount*700;
  const totalNego=DATA.filter(d=>d.status==='negociation').length;
  const forecast=Math.round(totalNego*500*0.3);

  const vendorRevenues=VENDOR_NAMES.map(v=>{
    const wins=DATA.filter(d=>d.vendeur===v&&d.status==='valide').length;
    return{name:v,rev:wins*500,wins};
  }).sort((a,b)=>b.rev-a.rev);
  const avgPerVendor=Math.round(totalRevenue/VENDOR_NAMES.length);
  const bestVendor=vendorRevenues[0];

  finHtml+=`
    <div class="fin-card"><div class="fin-card-val" style="color:var(--green)">${totalRevenue.toLocaleString()}\u20AC</div><div class="fin-card-lbl">Revenue total (${totalWon} x 500\u20AC)</div></div>
    <div class="fin-card"><div class="fin-card-val" style="color:var(--green)">${revenueWithMaintenance.toLocaleString()}\u20AC</div><div class="fin-card-lbl">Avec maintenance</div></div>
    <div class="fin-card"><div class="fin-card-val" style="color:var(--yellow)">${forecast.toLocaleString()}\u20AC</div><div class="fin-card-lbl">Prevision (nego x 30%)</div></div>
    <div class="fin-card"><div class="fin-card-val" style="color:var(--accent)">${avgPerVendor.toLocaleString()}\u20AC</div><div class="fin-card-lbl">Moy. par vendeur</div></div>
    <div class="fin-card" style="border-color:var(--green)"><div class="fin-card-val" style="color:var(--green)">${bestVendor?bestVendor.name:'-'}</div><div class="fin-card-lbl">Meilleur vendeur (${bestVendor?bestVendor.rev.toLocaleString():0}\u20AC)</div></div>
  `;
  finHtml+=`</div></div>`;

  // Inactivity alerts
  let alertHtml='';
  const dismissed=JSON.parse(localStorage.getItem('dismissed_alerts')||'{}');
  VENDOR_NAMES.forEach(v=>{
    const twoDaysAgo=new Date();twoDaysAgo.setDate(twoDaysAgo.getDate()-2);
    const recentCalls=DATA.filter(d=>d.vendeur===v&&d.call_date&&new Date(d.call_date)>=twoDaysAgo&&['appelle','negociation','rappeler','valide','perdu'].includes(d.status)).length;
    const alertKey=v+'_'+new Date().toISOString().slice(0,10);
    if(recentCalls<10&&!dismissed[alertKey]){
      alertHtml+=`<div class="alert-card">
        <span style="color:var(--red)"><strong>${v}</strong> \u2014 seulement ${recentCalls} appels en 2 jours</span>
        <button class="dismiss" onclick="dismissAlert('${alertKey}')">&#10005;</button>
      </div>`;
    }
  });
  if(alertHtml)finHtml+=`<div style="grid-column:1/-1;margin-bottom:16px"><h3 style="font-size:.82rem;font-weight:700;margin-bottom:12px;color:var(--red)">Alertes d'inactivite</h3>${alertHtml}</div>`;

  // Duplicate warnings
  let dupHtml='';
  const dupWarnings=findDuplicates();
  if(dupWarnings.length){
    dupHtml=`<div style="grid-column:1/-1;margin-bottom:16px"><h3 style="font-size:.82rem;font-weight:700;margin-bottom:12px;color:var(--yellow)">Doublons detectes</h3>`;
    dupWarnings.forEach(w=>{
      dupHtml+=`<div class="dup-item">${w.phone}: ${w.vendors.join(', ')}</div>`;
    });
    dupHtml+=`</div>`;
  }

  vv.innerHTML=finHtml+dupHtml+VENDOR_NAMES.map(v=>{
    const stats=getVendorStats(v);
    const pts=calcPoints(v);
    const badges=getBadges(v);
    const unlockedCount=Object.values(badges).filter(b=>b.unlocked).length;
    const projects=PROJECTS.filter(p=>p.vendeur===v);

    return `<div class="vendor-card"><h3>${v} <span style="font-size:.7rem;color:var(--yellow);margin-left:8px">\u2B50 ${pts} pts</span></h3>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Assignes</span><span class="vendor-stat-val" style="color:var(--accent)">${stats.total}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Appeles</span><span class="vendor-stat-val" style="color:var(--yellow)">${stats.calls}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Negociation</span><span class="vendor-stat-val" style="color:var(--orange)">${stats.nego}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Gagnes</span><span class="vendor-stat-val" style="color:var(--green)">${stats.wins}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Perdus</span><span class="vendor-stat-val" style="color:var(--red)">${stats.lost}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Revenue</span><span class="vendor-stat-val" style="color:var(--green)">${stats.rev.toLocaleString()}\u20AC</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Prevision</span><span class="vendor-stat-val" style="color:var(--yellow)">${(stats.nego*150).toLocaleString()}\u20AC</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Conversion</span><span class="vendor-stat-val" style="color:var(--purple)">${stats.conv}%</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Points</span><span class="vendor-stat-val" style="color:var(--yellow)">${pts}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Badges</span><span class="vendor-stat-val" style="color:var(--accent)">${unlockedCount}/${BADGE_DEFS.length}</span></div>
      <div class="vendor-stat-row"><span class="vendor-stat-lbl">Projets actifs</span><span class="vendor-stat-val" style="color:var(--accent)">${projects.filter(p=>p.status==='active').length}</span></div>
      <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:4px">${BADGE_DEFS.map(b=>{
        const s=badges[b.id]||{unlocked:false};
        return `<span style="font-size:1.1rem;${s.unlocked?'':'filter:grayscale(1);opacity:.3'}" title="${b.name}">${b.emoji}</span>`;
      }).join('')}</div>
      <div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="switchTab('badges');renderBadgesForVendor('${v}')">Voir badges</button></div>
    </div>`;
  }).join('');
}

function dismissAlert(key){
  const dismissed=JSON.parse(localStorage.getItem('dismissed_alerts')||'{}');
  dismissed[key]=true;
  localStorage.setItem('dismissed_alerts',JSON.stringify(dismissed));
  render();
}

async function renderScripts(){

    ${VENDOR_SCRIPTS.length<20?`<button class="btn btn-accent" onclick="openScriptEditor()">+ Add Script</button>`:''}

  if(!VENDOR_SCRIPTS.length){
    html+=`<div style="text-align:center;padding:60px;color:var(--gray)">Aucun script. Creez des post-its pour vos scripts d'appel personnels.</div>`;
  } else {
    html+=`<div class="scripts-masonry">`;
    VENDOR_SCRIPTS.forEach(s=>{
      const colorIdx=POSTIT_COLORS_DARK.findIndex(c=>c.name===(s.color||'yellow'));
      const pc=colorIdx>=0?POSTIT_COLORS_DARK[colorIdx]:POSTIT_COLORS_DARK[0];
      // If s.color is a hex, try to match or use default
      let bgColor=pc.bg,fgColor=pc.fg;
      html+=`<div class="postit" style="background:${bgColor};color:${fgColor}">
        <div class="postit-actions">
          <button onclick="openScriptEditor(${s.id})" style="color:${fgColor}">&#9998;</button>
          <button onclick="deleteScript(${s.id})" style="color:${fgColor}">&#128465;</button>
        </div>
        <div class="postit-title" style="color:${fgColor}">${s.title||''}</div>
        <div class="postit-content" style="color:${fgColor};opacity:.85">${s.content||''}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  sv.innerHTML=html;
}

function openScriptEditor(id){
  const existing=id?VENDOR_SCRIPTS.find(s=>s.id===id):null;
  const m=document.getElementById('modal2Content');
  const currentColor=existing?existing.color||'yellow':'yellow';

  const colorButtons=POSTIT_COLORS_DARK.map(c=>{
    const sel=currentColor===c.name;
    return `<div class="color-circle${sel?' selected':''}" style="background:${c.fg}" onclick="document.querySelectorAll('.color-circle').forEach(e=>e.classList.remove('selected'));this.classList.add('selected');document.getElementById('scriptColor').value='${c.name}'"></div>`;
  }).join('');

  m.innerHTML=`<h3><span>${existing?'Modifier':'Nouveau'}</span> Script</h3>
    <div class="modal-field"><label>Titre</label><input id="scriptTitle" value="${existing?(existing.title||'').replace(/"/g,'&quot;'):''}"></div>
    <div class="modal-field"><label>Contenu</label><textarea id="scriptContent" rows="6">${existing?(existing.content||''):''}</textarea></div>
    <div class="modal-field"><label>Couleur</label><div style="display:flex;gap:10px;flex-wrap:wrap">${colorButtons}</div></div>
    <input type="hidden" id="scriptColor" value="${currentColor}">
    <input type="hidden" id="scriptEditId" value="${id||''}">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal2()">Annuler</button>
      <button class="btn btn-accent" onclick="saveScript()">Sauvegarder</button>
    </div>`;
  document.getElementById('modal2Overlay').classList.remove('hidden');
}

async function saveScript(){
  const title=document.getElementById('scriptTitle').value.trim();
  const content=document.getElementById('scriptContent').value.trim();
  const color=document.getElementById('scriptColor').value;
  const editId=document.getElementById('scriptEditId').value;

  if(!title){alert('Titre requis');return;}

  if(editId){
    await sb.from('vendor_scripts').update({title,content,color}).eq('id',parseInt(editId));
  } else {
    if(VENDOR_SCRIPTS.length>=20){alert('Maximum 20 scripts');return;}
    await sb.from('vendor_scripts').insert([{title,content,color,vendor_name:currentUser}]);
  }
  closeModal2();
  renderScripts();
}

async function deleteScript(id){
  if(!confirm('Supprimer ce script?'))return;
  await sb.from('vendor_scripts').delete().eq('id',id);
  renderScripts();
}

function filterLogs(){
  const vendor=document.getElementById('logFVendor').value;
  const action=document.getElementById('logFAction').value;
  const date=document.getElementById('logFDate').value;
  const tbody=document.getElementById('logTbody');

  let filtered=ACTIVITY_LOG;
  if(vendor)filtered=filtered.filter(l=>l.vendor_name===vendor);
  if(action)filtered=filtered.filter(l=>l.action===action);

async function blacklistProspect(id,name){
  const reason=prompt('Raison du blacklist:\n1. Wrong number\n2. Not interested\n3. Rude\n\nEntrez le numero (1-3) ou un texte:');
  if(!reason&&reason!=='')return;
  const reasonMap={'1':'Wrong number','2':'Not interested','3':'Rude'};
  const finalReason=reasonMap[reason]||reason||'Non specifie';

  if(!confirm('Blacklister '+name+' ? Raison: '+finalReason))return;

  const row=DATA.find(d=>d.id===id);
  await sb.from('blacklist').insert([{
    prospect_id:id,
    phone:row?row.numero:'',
    business_name:name,
    reason:finalReason,
    blacklisted_by:currentUser,
    created_at:new Date().toISOString()
  }]);

  // Also mark prospect as blacklisted
  await sb.from('prospects').update({blacklisted:true}).eq('id',id);

  BLACKLIST.push({prospect_id:id,phone:row?row.numero:'',business_name:name,reason:finalReason,blacklisted_by:currentUser,created_at:new Date().toISOString()});
  DATA=DATA.filter(d=>d.id!==id);

  await logActivity('blacklist',name,id,'Reason: '+finalReason);
  showToast('Blackliste',name+' a ete blackliste.','var(--red)');
  render();
}

function renderBlacklist(){
  if(!isAdmin)return;
  const bv=document.getElementById('blacklistView');

  let html=`<h2 style="font-size:1.2rem;font-weight:800;margin-bottom:20px">Blacklist (${BLACKLIST.length})</h2>`;

  if(!BLACKLIST.length){
    html+=`<div style="text-align:center;padding:60px;color:var(--gray)">Aucun prospect blackliste.</div>`;
    bv.innerHTML=html;return;
  }

  html+=`<div style="overflow-x:auto"><table class="log-table"><thead><tr>
    <th>Prospect</th><th>Telephone</th><th>Raison</th><th>Par</th><th>Date</th><th>Action</th>
  </tr></thead><tbody>`;

  BLACKLIST.forEach(b=>{
    html+=`<tr>
      <td>${b.business_name||b.prospect_name||'ID: '+b.prospect_id}</td>
      <td>${b.phone||''}</td>
      <td>${b.reason||''}</td>
      <td>${b.blacklisted_by||b.vendor_name||''}</td>
      <td>${b.created_at?new Date(b.created_at).toLocaleDateString('fr-FR'):''}</td>
      <td><button class="btn btn-green btn-sm" onclick="restoreFromBlacklist(${b.id},${b.prospect_id})">Restaurer</button></td>
    </tr>`;
  });

  html+=`</tbody></table></div>`;
  bv.innerHTML=html;
}

async function restoreFromBlacklist(blId,prospectId){
  if(!confirm('Restaurer ce prospect?'))return;
  await sb.from('blacklist').delete().eq('id',blId);
  await sb.from('prospects').update({blacklisted:false}).eq('id',prospectId);
  BLACKLIST=BLACKLIST.filter(b=>b.id!==blId);

  // Re-fetch the prospect
  const{data}=await sb.from('prospects').select('*').eq('id',prospectId).single();
  if(data)DATA.push(data);

  await logActivity('restore','',prospectId,'Restored from blacklist');
  showToast('Restaure','Prospect restaure.','var(--green)');
  render();
}

// ========================================
// DUPLICATE DETECTION
// ========================================
function findDuplicates(){
  const phoneMap={};
  DATA.forEach(d=>{
    if(!d.numero||!d.vendeur)return;
    if(!phoneMap[d.numero])phoneMap[d.numero]=new Set();
    phoneMap[d.numero].add(d.vendeur);
  });
  const dups=[];
  Object.entries(phoneMap).forEach(([phone,vendors])=>{
    if(vendors.size>1)dups.push({phone,vendors:[...vendors]});
  });
  return dups;
}

function checkDuplicates(){
  const dups=findDuplicates();
  if(dups.length){
    const el=document.getElementById('adminAlerts');
    if(el&&isAdmin){
      let html='';
      dups.slice(0,5).forEach(d=>{
        html+=`<div class="alert-card" style="border-color:var(--yellow);background:rgba(210,153,34,.06)">
          <span style="color:var(--yellow)">Doublon: <strong>${d.phone}</strong> assigne a ${d.vendors.join(' et ')}</span>
        </div>`;
      });
      el.innerHTML=html;
    }
  }
}

// DAILY CHALLENGE
// ========================================
function renderChallengeBanner(){
  if(isAdmin){document.getElementById('challengeBanner').classList.add('hidden');return;}
  const banner=document.getElementById('challengeBanner');
  banner.classList.remove('hidden');
  const dayOfWeek=new Date().getDay();
  const challenge=DAILY_CHALLENGES.find(c=>c.day===dayOfWeek)||DAILY_CHALLENGES[6];

  let current=0,target=challenge.target;
  if(challenge.metric==='calls_today')current=getTodayCalls(currentUser);
  else if(challenge.metric==='sales_week')current=getWeekSales(currentUser);
  else if(challenge.metric==='interested_today'){
    const today=new Date().toISOString().slice(0,10);
    current=DATA.filter(d=>d.vendeur===currentUser&&d.status==='negociation'&&d.updated_at&&d.updated_at.slice(0,10)===today).length;
  }else if(challenge.metric==='region_pct'){
    const myProj=PROJECTS.find(p=>p.vendeur===currentUser&&p.status==='active');
    if(myProj){
      const rp=DATA.filter(d=>d.region===myProj.region);
      const called=rp.filter(d=>d.vendeur===currentUser&&['appelle','negociation','rappeler','valide','perdu'].includes(d.status));
      current=rp.length>0?Math.round((called.length/rp.length)*100):0;
    }
    target=100;
  }else if(challenge.metric==='rest'){current=0;target=0;}

  const pct=target>0?Math.min(100,Math.round((current/target)*100)):100;
  const complete=pct>=100;

  const todayKey='challenge_'+currentUser+'_'+new Date().toISOString().slice(0,10);
  const alreadyClaimed=localStorage.getItem(todayKey);
  if(complete&&!alreadyClaimed&&challenge.metric!=='rest'){
    localStorage.setItem(todayKey,'1');
    const bonusMatch=challenge.reward.match(/\+(\d+)/);
    if(bonusMatch){
      const bonus=parseInt(bonusMatch[1]);
      const currentBonus=parseInt(localStorage.getItem('bonus_pts_'+currentUser)||'0');
      localStorage.setItem('bonus_pts_'+currentUser,String(currentBonus+bonus));
    }
    showToast('Challenge Complete!',challenge.title+' - '+challenge.reward,'var(--green)');
  }

  banner.innerHTML=`
    <div class="challenge-icon">${challenge.icon}</div>
    <div class="challenge-info">
      <div class="challenge-title">${challenge.title} ${complete?'\u2705':''}</div>
      <div class="challenge-desc">${challenge.desc} \u2192 ${challenge.reward}</div>
      ${target>0?`<div class="challenge-progress">
        <div style="display:flex;justify-content:space-between">
          <span class="challenge-pct">${current}/${target}</span>
          <span class="challenge-pct">${pct}%</span>
        </div>
        <div class="challenge-bar-bg"><div class="challenge-bar" style="width:${pct}%"></div></div>
      </div>`:''}
    </div>`;
}

// ========================================
// BADGE CHECKING
// ========================================
function checkBadges(){
  if(isAdmin)return;
  const vendor=currentUser;
  const badges=getBadges(vendor);
  const stats=getVendorStats(vendor);
  const pts=calcPoints(vendor);
  const todayCalls=getTodayCalls(vendor);
  const weekSales=getWeekSales(vendor);
  const newUnlocks=[];

  function unlock(id){
    if(!badges[id])badges[id]={unlocked:false,date:null};
    if(!badges[id].unlocked){
      badges[id].unlocked=true;
      badges[id].date=new Date().toISOString();
      newUnlocks.push(id);
    }
  }

  // BEGINNER
  if(stats.calls>=1)unlock('first_step');
  if(todayCalls>=5)unlock('ice_breaker');
  if(stats.calls>=10)unlock('getting_started');
  if(stats.nego>=1||stats.wins>=1)unlock('first_blood');
  if(stats.wins>=1)unlock('rookie_sale');
  const vd=DATA.filter(d=>d.vendeur===vendor&&d.call_date);
  if(vd.some(d=>{const h=new Date(d.call_date).getHours();return h<9}))unlock('early_bird');
  if(vd.some(d=>{const h=new Date(d.call_date).getHours();return h>=19}))unlock('night_owl');
  if(todayCalls>=5)unlock('speed_dialer');
  if(stats.notes>=10)unlock('note_taker');
  if(stats.regions.length>=3)unlock('explorer');

  // INTERMEDIATE
  if(todayCalls>=10)unlock('call_machine');
  const streakKey='streak_'+vendor;
  let streak=JSON.parse(localStorage.getItem(streakKey)||'{"days":[],"count":0}');
  const today=new Date().toISOString().slice(0,10);
  if(todayCalls>=10&&!streak.days.includes(today)){
    streak.days.push(today);
    streak.days=streak.days.filter(d=>{const diff=(new Date()-new Date(d))/(1000*60*60*24);return diff<30});
    localStorage.setItem(streakKey,JSON.stringify(streak));
  }
  if(streak.days.length>=3){
    const sorted=streak.days.sort();
    let consec=1,maxConsec=1;
    for(let i=1;i<sorted.length;i++){
      const d1=new Date(sorted[i-1]),d2=new Date(sorted[i]);
      if((d2-d1)/(1000*60*60*24)<=1){consec++;maxConsec=Math.max(maxConsec,consec)}else{consec=1}
    }
    if(maxConsec>=3)unlock('hot_streak');
    if(maxConsec>=7)unlock('unstoppable');
  }
  if(weekSales>=3)unlock('silver_tongue');
  const vendorRegions=[...new Set(DATA.filter(d=>d.vendeur===vendor).map(d=>d.region))].filter(Boolean);
  vendorRegions.forEach(r=>{
    const rp=DATA.filter(d=>d.region===r&&d.vendeur===vendor);
    const done=rp.filter(d=>['appelle','negociation','rappeler','valide','perdu'].includes(d.status));
    if(rp.length>0&&done.length===rp.length)unlock('region_master');
  });
  if(stats.total>=50)unlock('hunter');
  if(stats.wins>=5)unlock('persuader');
  if(stats.rev>=1000)unlock('revenue_maker');
  if(stats.nego>=10)unlock('pipeline_king');
  if(stats.wins>=3)unlock('follow_up_king');
  const rankings=VENDOR_NAMES.map(v=>({name:v,pts:calcPoints(v)})).sort((a,b)=>b.pts-a.pts);
  if(rankings[0].name===vendor)unlock('weekly_champion');

  // ADVANCED
  if(stats.wins>=10)unlock('legend');
  if(weekSales>=5)unlock('closer');
  if(pts>=500)unlock('elite');
  if(rankings[0].name===vendor)unlock('top_gun');
  if(stats.rev>=5000)unlock('gold_rush');
  if(stats.calls>=100)unlock('marathon_runner');
  if(stats.wins>=10)unlock('master_negotiator');
  let completedRegions=0;
  vendorRegions.forEach(r=>{
    const rp=DATA.filter(d=>d.region===r&&d.vendeur===vendor);
    const done=rp.filter(d=>['appelle','negociation','rappeler','valide','perdu'].includes(d.status));
    if(rp.length>0&&done.length===rp.length)completedRegions++;
  });
  if(completedRegions>=3)unlock('island_conqueror');
  if(pts>=1000)unlock('vantage_legend');

  // SPECIAL
  if(todayCalls>=15&&getWeekSales(vendor)>=1)unlock('perfect_day');
  if(stats.wins>=1&&stats.rappeler>=3)unlock('comeback_kid');
  if(stats.wins>=5)unlock('greek_god');
  if(stats.wins>=3)unlock('the_architect');
  if(stats.wins>=20)unlock('hall_of_fame');
  if(stats.rev>=10000)unlock('money_printer');

  saveBadges(vendor,badges);

  newUnlocks.forEach(id=>{
    const def=BADGE_DEFS.find(b=>b.id===id);
    if(def){
      showToast('Badge Debloque! '+def.emoji,def.name+' - '+def.desc,'var(--yellow)',true);
    }
  });
}

// ========================================
// TOAST SYSTEM
// ========================================
function showToast(title,body,borderColor,withConfetti){
  const container=document.getElementById('toastContainer');
  const toast=document.createElement('div');
  toast.className='toast'+(borderColor==='var(--yellow)'?' badge-toast':'');
  toast.style.borderColor=borderColor||'var(--accent)';
  toast.innerHTML=`<button class="toast-close" onclick="this.parentElement.remove()">\u2715</button><div class="toast-title">${title}</div><div class="toast-body">${body}</div>`;
  container.appendChild(toast);
  if(withConfetti)spawnConfetti();
  setTimeout(()=>{
    toast.style.animation='slideOutToast .4s ease forwards';
    setTimeout(()=>toast.remove(),400);
  },4000);
}

function spawnConfetti(){
  const container=document.createElement('div');
  container.className='confetti-container';
  document.body.appendChild(container);
  const colors=['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#db6d28','#ff7eb3','#7ee8fa'];
  for(let i=0;i<40;i++){
    const dot=document.createElement('div');
    dot.className='confetti-dot';
    dot.style.left=Math.random()*100+'%';
    dot.style.top='-10px';
    dot.style.background=colors[Math.floor(Math.random()*colors.length)];
    dot.style.animationDelay=Math.random()*1.5+'s';
    dot.style.width=(4+Math.random()*8)+'px';
    dot.style.height=dot.style.width;
    container.appendChild(dot);
  }
  setTimeout(()=>container.remove(),4000);
}

// ========================================
// UPDATE
// ========================================
async function updateField(id,field,value){
  const obj={};obj[field]=value;obj.updated_at=new Date().toISOString();
  if(field==='status'&&['appelle','negociation','rappeler','valide','perdu'].includes(value)){
    obj.call_date=new Date().toISOString();
  }

  const row=DATA.find(d=>d.id===id);
  const oldStatus=row?row.status:'';

  await sb.from('prospects').update(obj).eq('id',id);
  if(row){
    Object.keys(obj).forEach(k=>{row[k]=obj[k]});
  }

  // Log activity
  if(field==='status'){
    await logActivity('status_change',row?row.nom:'',id,oldStatus+' -> '+value);
  }

  // Auto-create client when status becomes "valide"
  if(field==='status'&&value==='valide'&&row){
    const alreadyClient=CLIENTS.find(c=>c.prospect_id===id);
    if(!alreadyClient){
      const clientData={
        prospect_id:id,
        business_name:row.nom||'',
        phone:row.numero||'',
        vendor_name:row.vendeur||currentUser,
        sold_at:new Date().toISOString(),
        site_status:'not_started',
        with_maintenance:false
      };
      const{data}=await sb.from('clients').insert([clientData]).select();
      if(data&&data[0])CLIENTS.push(data[0]);
      showToast('Nouveau client!',row.nom+' ajoute aux clients.','var(--green)');
    }
  }

  // If rappeler, prompt for reminder
  if(field==='status'&&value==='rappeler'&&row&&!isAdmin){
    setTimeout(()=>showReminderPicker(id,row.nom||''),300);
  }

  render();
}

    doc.text('Calls: '+stats.calls+' | Won: '+stats.wins+' | Negotiation: '+stats.nego+' | Points: '+pts,20,y);y+=5;
    doc.text('Revenue: '+stats.rev.toLocaleString()+' EUR | Badges: '+unlockedCount+'/'+BADGE_DEFS.length,20,y);y+=10;

    if(y>270){doc.addPage();y=20;}
  });

  doc.save('vantage_report_'+now.toISOString().slice(0,10)+'.pdf');
  showToast('PDF genere','Rapport telecharge.','var(--green)');
}

// ========================================
// REALTIME
// ========================================
sb.channel('changes').on('postgres_changes',{event:'*',schema:'public',table:'prospects'},p=>{
  if(p.eventType==='UPDATE'){
    const i=DATA.findIndex(d=>d.id===p.new.id);
    if(p.new.blacklisted){
      if(i>=0)DATA.splice(i,1);
    } else {
      if(i>=0)DATA[i]=p.new;
      else DATA.push(p.new);
    }
  }
  else if(p.eventType==='INSERT'){
    const blIds=new Set(BLACKLIST.map(b=>b.prospect_id));
    if(!blIds.has(p.new.id)&&!p.new.blacklisted)DATA.push(p.new);
  }
  render();
}).subscribe();

sb.channel('proj-changes').on('postgres_changes',{event:'*',schema:'public',table:'projects'},async()=>{
  const{data}=await sb.from('projects').select('*').order('id');PROJECTS=data||[];render();
}).subscribe();

sb.channel('client-changes').on('postgres_changes',{event:'*',schema:'public',table:'clients'},async()=>{
  const{data}=await sb.from('clients').select('*').order('id');CLIENTS=data||[];render();
}).subscribe();

sb.channel('reminder-changes').on('postgres_changes',{event:'*',schema:'public',table:'reminders'},async()=>{
  const{data}=await sb.from('reminders').select('*').order('remind_at');REMINDERS=data||[];
  if(currentTab==='reminders')render();
}).subscribe();

sb.channel('blacklist-changes').on('postgres_changes',{event:'*',schema:'public',table:'blacklist'},async()=>{
  const{data}=await sb.from('blacklist').select('*').order('id');BLACKLIST=data||[];
  const blIds=new Set(BLACKLIST.map(b=>b.prospect_id));
  DATA=DATA.filter(d=>!blIds.has(d.id));
  render();
}).subscribe();
</script>
